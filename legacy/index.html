fects:{south:2,plains:2,midwest:1},trump_effects:{south:2,plains:2},trump_tag:`plus`},{text:`Pivot away from the controversy and focus all October energy on your economic record and the vaccine.`,feedback:`A disciplined close on substance. You stop the bleeding in Michigan and run up the score in Florida and Texas.`,effects:{political_capital:15,approval:5,base_enthusiasm:8,funds:-3e4},regional_effects:{midwest:3,south:5,plains:4,northeast:1},trump_effects:{south:3,plains:3},trump_tag:`plus`}]},{id:11,phase:`campaign`,candidate_id:`trump`,question:`Election Eve. Internal data shows Florida and North Carolina are yours but Pennsylvania is slipping. Where do you make your last stand?`,answers:[{text:`Hold a marathon rally schedule — five states in one day. No sleep. The final MAGA surge.`,feedback:`The physical marathon tour generates wild enthusiasm and drives Election Day turnout over the top in the Midwest.`,effects:{political_capital:0,approval:1,base_enthusiasm:30,funds:-2e4},regional_effects:{midwest:6,south:3,plains:3},trump_effects:{south:4,plains:4},trump_tag:`plus`},{text:`Declare victory in Florida live on TV before all votes are counted — force the media narrative.`,feedback:`The early declaration fires up your base but the media immediately calls it premature. The night's coverage pivots to Pennsylvania.`,effects:{political_capital:-10,approval:-5,base_enthusiasm:15,funds:0},regional_effects:{south:2,plains:2},trump_effects:{south:3,plains:3},trump_tag:`plus`},{text:`Focus on a final Pennsylvania barnstorm — Pittsburgh to Philadelphia, targeting disaffected union Democrats.`,feedback:`The Pennsylvania play works. Working-class Democrats in Erie and Scranton flip, providing a narrow but decisive margin.`,effects:{political_capital:0,approval:3,base_enthusiasm:20,funds:-25e3},regional_effects:{midwest:7,south:2,plains:2},trump_effects:{south:2,plains:2},trump_tag:`plus`}]},{id:12,phase:`campaign`,candidate_id:`trump`,question:`Election Night. You are watching the results roll in. Florida and Ohio are called for you. Pennsylvania, Michigan, and Wisconsin are all on a knife's edge as Democratic urban votes are counted. What is your play?`,answers:[{text:`Declare victory on live national television before the counting is complete and demand officials stop counting.`,feedback:`Your base cheers. But the calls keep coming in and the contested results hand the opposition a 'stolen election' narrative.`,effects:{political_capital:-15,approval:-8,base_enthusiasm:25,funds:0},regional_effects:{plains:5,south:5,northeast:-6,west_coast:-6,midwest:-4},trump_effects:{south:6,plains:6},trump_tag:`plus`},{text:`Wait for results, deploy your legal teams to all three states to file challenges the moment a margin appears.`,feedback:`A legally measured approach that sets the stage for post-election battles. The base wants more defiance but the groundwork is laid.`,effects:{political_capital:10,approval:-2,base_enthusiasm:10,funds:-3e4},regional_effects:{plains:2,south:2},trump_effects:{south:2,plains:2},trump_tag:`plus`},{text:`Hit the phones — call state Republican legislators in swing states and demand they certify regardless of final counts.`,feedback:`The calls become public, creating a media firestorm. Your base is emboldened by the fight, and many state-level Republicans echo your concerns about 'election integrity.' The nation is shocked, but your party remains largely unified.`,effects:{political_capital:-5,approval:-6,base_enthusiasm:30,funds:0},regional_effects:{plains:4,south:4,northeast:-8,west_coast:-8,midwest:-5},trump_effects:{south:7,plains:7},trump_tag:`plus`}]},{id:3,phase:`governing`,candidate_id:`aoc`,question:`America is facing a historic housing crisis. Rents have risen 40% in five years. Your base demands a federal rent control mandate. Real estate lobbies and moderate Democrats warn it will kill new housing construction.`,answers:[{text:`Issue a federal emergency rent stabilization order capping rent increases at 3% annually for the next five years.`,feedback:`Renters across the country erupt in celebration. Landlords immediately challenge the order in court. New construction stalls.`,effects:{political_capital:-20,approval:5,base_enthusiasm:28,funds:-1e4},regional_effects:{northeast:5,west_coast:5,midwest:2,south:-2,plains:-3},legislative_effects:-8},{text:`Invest $500 billion in federal public housing construction — build 1.5 million new units in five years.`,feedback:`The most ambitious housing program since FDR's New Deal. Construction unions are thrilled. Real estate investors are alarmed.`,effects:{political_capital:-30,approval:4,base_enthusiasm:20,funds:-8e4},regional_effects:{northeast:4,west_coast:4,midwest:3,south:1},legislative_effects:-5},{text:`Offer low-income housing tax credits to developers and reform zoning laws to increase housing supply.`,feedback:`A market-friendly approach that builds bipartisan coalition support, though progressives call it a half-measure for landlords.`,effects:{political_capital:10,approval:3,base_enthusiasm:-15,funds:0},regional_effects:{midwest:2,south:2},legislative_effects:6}]},{id:4,phase:`governing`,candidate_id:`aoc`,question:`A viral police brutality video sparks nationwide protests and demands to 'defund the police.' Your base supports it fully. Moderate Democrats in swing districts are panicking. How do you respond?`,answers:[{text:`Fully embrace the defund movement — announce a plan to redirect 25% of police budgets to mental health and community programs.`,feedback:`Progressive cities erupt in solidarity marches. But moderate Democrats suffer badly in special elections across suburban districts.`,effects:{political_capital:-15,approval:-5,base_enthusiasm:30,funds:-2e4},regional_effects:{northeast:4,west_coast:4,midwest:-5,south:-6,plains:-5},legislative_effects:-12},{text:`Champion police accountability and reform — ban chokeholds, mandate body cameras, end qualified immunity.`,feedback:`A popular and legally durable reform package that passes with a bipartisan supermajority and widespread national approval.`,effects:{political_capital:-10,approval:7,base_enthusiasm:10,funds:-1e4},regional_effects:{northeast:3,west_coast:3,midwest:2,south:2,plains:1},legislative_effects:8},{text:`Call for calm, condemn police violence and rioting equally, and propose a bipartisan law enforcement task force.`,feedback:`A measured tone that alienates your activist base who call it 'both-sidesing.' But it stabilizes your numbers with independents.`,effects:{political_capital:10,approval:2,base_enthusiasm:-20,funds:0},regional_effects:{midwest:3,south:2,northeast:-2,west_coast:-2},legislative_effects:3}]},{id:5,phase:`governing`,candidate_id:`aoc`,question:`Republicans are threatening to not raise the debt ceiling unless you agree to massive spending cuts. The U.S. could default for the first time in history. Treasury Secretary warns of a global economic catastrophe. What do you do?`,answers:[{text:`Invoke the 14th Amendment — declare the debt ceiling unconstitutional and order the Treasury to keep paying its debts.`,feedback:`A bold constitutional gambit that sends markets soaring. Republicans sue immediately, and the case heads to the Supreme Court.`,effects:{political_capital:-20,approval:5,base_enthusiasm:20,funds:0},regional_effects:{northeast:4,west_coast:4,midwest:1},legislative_effects:-5},{text:`Negotiate a grand bargain — agree to freeze spending at current levels in exchange for a two-year debt ceiling extension.`,feedback:`Default is averted. Markets stabilize. Your progressive base calls the freeze a betrayal of every promise you ever made.`,effects:{political_capital:15,approval:3,base_enthusiasm:-25,funds:0},regional_effects:{midwest:4,south:2,northeast:-3,west_coast:-3},legislative_effects:8},{text:`Mint a $1 trillion platinum coin and deposit it at the Federal Reserve — a legal loophole to bypass Congress entirely.`,feedback:`Legal scholars say it works. Economists are divided. The media circus is enormous, but default is avoided and Republicans have no counter.`,effects:{political_capital:-10,approval:2,base_enthusiasm:15,funds:0},regional_effects:{northeast:2,west_coast:2},legislative_effects:2}]},{id:7,phase:`campaign`,candidate_id:`aoc`,question:`Your re-election campaign launches. The Republican nominee is running on economic anxiety and crime. How do you frame your campaign?`,answers:[{text:`Run on the Green New Deal's job creation record — '5 million clean energy jobs in four years. That's the revolution.'`,feedback:`A powerful economic narrative that wins back some Rust Belt union workers. Environmental base turns out at record rates.`,effects:{political_capital:0,approval:3,base_enthusiasm:28,funds:-25e3},regional_effects:{northeast:5,west_coast:5,midwest:4,south:-3,plains:-4}},{text:`Focus on popular wins — drug prices, housing investments, expanded Medicare — and defend your record.`,feedback:`Solid incumbent defense that protects suburban gains. Progressives feel underrepresented in the messaging but independents approve.`,effects:{political_capital:10,approval:5,base_enthusiasm:-5,funds:-3e4},regional_effects:{midwest:4,south:2,northeast:2,west_coast:2}},{text:`Run an explicitly anti-billionaire, anti-corporate campaign — make wealth inequality the defining issue.`,feedback:`Class warfare messaging dominates the news cycle. Young voter registration explodes. Wall Street donors fund the opposition.`,effects:{political_capital:-5,approval:-1,base_enthusiasm:30,funds:-4e4},regional_effects:{northeast:6,west_coast:6,midwest:3,south:-4,plains:-5}}]},{id:8,phase:`campaign`,candidate_id:`aoc`,question:`Debate night. Your opponent calls you 'the most radical and dangerous president in American history.' The country is watching. How do you respond?`,answers:[{text:`Own the progressive label proudly: 'Radical? FDR was called radical. The Suffragists were called radical. I'll wear that badge.'`,feedback:`An electrifying debate moment that goes viral. Your base erupts. Suburban moderates in Ohio remain unconvinced.`,effects:{political_capital:-5,approval:1,base_enthusiasm:28,funds:0},regional_effects:{northeast:5,west_coast:5,south:-4,plains:-4,midwest:-2}},{text:`Pivot to your record: '5 million jobs, lower drug prices, the most homes built since 1978. Is that radical?'`,feedback:`Record-based defense wins the fact-checker wars. Undecided viewers rate you the winner by 12 points in post-debate polls.`,effects:{political_capital:5,approval:6,base_enthusiasm:10,funds:0},regional_effects:{midwest:5,south:3,northeast:3,west_coast:3}},{text:`Turn the attack back: 'Radical is cutting Medicare. Radical is letting people die for insulin costs. That's what I'm fighting.'`,feedback:`A devastating counter-punch on healthcare that dominates the post-debate coverage. Seniors respond in swing-state polling.`,effects:{political_capital:0,approval:4,base_enthusiasm:18,funds:0},regional_effects:{midwest:4,south:3,northeast:4,west_coast:4,plains:2}}]},{id:9,phase:`campaign`,candidate_id:`aoc`,question:`A conservative Super PAC releases an attack ad falsely claiming your climate policies caused a recent factory closure in Ohio. The ad is going viral in the Midwest. How do you respond?`,answers:[{text:`Go on offense immediately — release the real facts with worker testimonials and a massive counter-ad buy in Ohio.`,feedback:`The counter-ads perform brilliantly. The PAC's credibility is shredded, and your climate jobs message resonates strongly.`,effects:{political_capital:-5,approval:4,base_enthusiasm:10,funds:-4e4},regional_effects:{midwest:6,south:1,northeast:2}},{text:`Hold a live press conference at the factory with the actual workers and union reps to debunk the ad in person.`,feedback:`An extraordinarily effective visual. The image of you at the factory overwhelms the PAC's narrative completely.`,effects:{political_capital:-10,approval:6,base_enthusiasm:15,funds:-15e3},regional_effects:{midwest:7,south:2,northeast:3}},{text:`Let surrogates and fact-checkers handle the rebuttal while you focus on your final-stretch campaign schedule.`,feedback:`The rebuttal is credible but lacks the visual punch. The story persists in Ohio media for another week.`,effects:{political_capital:5,approval:1,base_enthusiasm:0,funds:0},regional_effects:{midwest:2}}]},{id:10,phase:`campaign`,candidate_id:`aoc`,question:`A progressive Green Party candidate is siphoning 4-6% of your vote in three key swing states. Their slogan is 'AOC sold out.' How do you handle them?`,answers:[{text:`Offer them a major cabinet position — Secretary of the Environment — in exchange for them dropping out.`,feedback:`A stunning move. They accept. Their endorsement brings their entire activist base back to your coalition overnight.`,effects:{political_capital:-10,approval:3,base_enthusiasm:15,funds:-1e4},regional_effects:{west_coast:5,northeast:5,midwest:2}},{text:`Invite their leader to debate your climate record head-to-head and let the best vision win the progressive vote.`,feedback:`You win the debate handily. The Green candidate looks small by comparison and their polling collapses.`,effects:{political_capital:0,approval:4,base_enthusiasm:12,funds:-1e4},regional_effects:{west_coast:4,northeast:4,midwest:2}},{text:`Warn progressive voters about the spoiler effect: 'A vote for the Green Party is a vote to repeal everything we built.'`,feedback:`Mathematically effective. 60% of their voters come home. The remaining holdouts aren't worth fighting.`,effects:{political_capital:5,approval:1,base_enthusiasm:-5,funds:-2e4},regional_effects:{west_coast:3,northeast:3,midwest:1}}]},{id:11,phase:`campaign`,candidate_id:`aoc`,question:`Election Eve. Your strongest ground game states are Nevada, Arizona, and Wisconsin. Where do you concentrate your final resources?`,answers:[{text:`Pour everything into a Wisconsin and Michigan GOTV surge — young voters, unions, and college towns.`,feedback:`Record youth and union turnout in the Great Lakes flips the map decisively in your favor. A historic progressive coalition.`,effects:{political_capital:0,approval:2,base_enthusiasm:25,funds:-3e4},regional_effects:{midwest:7,northeast:2,west_coast:2}},{text:`Hold massive multi-city rallies with celebrity surrogates — a media spectacle that drowns out the opposition.`,feedback:`The spectacle generates enormous free media coverage and drives youth turnout in cities nationwide.`,effects:{political_capital:5,approval:3,base_enthusiasm:20,funds:-35e3},regional_effects:{northeast:5,west_coast:5,midwest:3,south:2}},{text:`Spend the final day door-knocking in Sun Belt suburbs — build the new progressive majority in the South.`,feedback:`An audacious final play that shocks the political establishment. Arizona and Georgia go to the wire.`,effects:{political_capital:0,approval:4,base_enthusiasm:12,funds:-25e3},regional_effects:{south:6,midwest:2,west_coast:2}}]},{id:12,phase:`campaign`,candidate_id:`aoc`,question:`A last-minute social media post by a major influencer falsely claims you support 'open borders and abolishing ICE.' It is going viral and creating panic in your campaign. The election is tomorrow.`,answers:[{text:`Post a direct, two-minute video rebuttal stating exactly what your immigration policy is and calling out the disinformation.`,feedback:`Your authentic video gets 40 million views overnight. The disinformation is buried under your own message.`,effects:{political_capital:0,approval:4,base_enthusiasm:12,funds:0},regional_effects:{south:3,midwest:4,northeast:3,west_coast:3,plains:2}},{text:`Have your legal team issue a formal cease-and-desist and demand the platform remove the post immediately.`,feedback:`The post is removed within hours but screenshots spread everywhere. The legal action itself becomes part of the story.`,effects:{political_capital:5,approval:-1,base_enthusiasm:5,funds:-5e3},regional_effects:{northeast:1,west_coast:1}},{text:`Ignore it and let your surrogates handle it — stay on your closing message about climate and healthcare jobs.`,feedback:`The surrogates are credible and the story fades by morning. Your disciplined closing message reaches undecideds on election day.`,effects:{political_capital:10,approval:3,base_enthusiasm:8,funds:0},regional_effects:{midwest:3,south:2,northeast:2,west_coast:2,plains:1}}]},{id:1,phase:`governing`,candidate_id:`rfk_sr`,question:`You are facing the defining decision of your presidency: the Vietnam War. 550,000 U.S. troops are deployed. Casualties are mounting. The anti-war movement is exploding on college campuses. How do you proceed?`,answers:[{text:`Announce an immediate and unconditional withdrawal of all U.S. forces within 90 days — end the war now.`,feedback:`Anti-war America erupts in celebration. Veterans' groups are furious. The military establishment quietly begins opposing your agenda.`,effects:{political_capital:-20,approval:5,base_enthusiasm:30,funds:-1e4},regional_effects:{northeast:7,west_coast:6,midwest:-3,south:-5,plains:-5},legislative_effects:-10},{text:`Announce a phased withdrawal over 18 months tied to peace negotiations with Hanoi via back channels.`,feedback:`A measured, diplomatic path that gives the military time to redeploy honorably. Hawks are contained. The peace movement cautiously supports it.`,effects:{political_capital:-5,approval:4,base_enthusiasm:10,funds:0},regional_effects:{northeast:4,west_coast:3,midwest:1},legislative_effects:3},{text:`Maintain current troop levels but suspend bombing campaigns and push a negotiated settlement at Paris peace talks.`,feedback:`A cautious approach that satisfies neither side fully, but keeps the coalition together while pursuing diplomacy.`,effects:{political_capital:5,approval:-2,base_enthusiasm:-10,funds:-1e4},regional_effects:{midwest:2,south:1,plains:1},legislative_effects:2}]},{id:2,phase:`governing`,candidate_id:`rfk_sr`,question:`Urban riots continue to tear through major American cities following continued police violence against Black communities. Your attorney general is recommending federal intervention. How do you respond?`,answers:[{text:`Lead a major federal civil rights enforcement push — send DOJ civil rights attorneys to every major city.`,feedback:`Black communities feel genuinely supported. Southern conservatives are outraged, but your moral leadership defines the moment.`,effects:{political_capital:-15,approval:3,base_enthusiasm:22,funds:-2e4},regional_effects:{northeast:5,west_coast:4,midwest:3,south:-6,plains:-4},legislative_effects:-6},{text:`Travel personally to the neighborhoods that are burning — walk the streets, listen to community leaders, demonstrate solidarity.`,feedback:`Your personal courage in the streets stops the riots in every city you visit. The image reshapes your presidency.`,effects:{political_capital:-10,approval:8,base_enthusiasm:20,funds:-5e3},regional_effects:{northeast:6,west_coast:5,midwest:4,south:-4},legislative_effects:5},{text:`Call for law and order while simultaneously announcing an emergency federal anti-poverty program for urban communities.`,feedback:`A dual approach that calms the immediate unrest while addressing root causes. Both wings of the coalition are partially satisfied.`,effects:{political_capital:-10,approval:5,base_enthusiasm:5,funds:-3e4},regional_effects:{northeast:3,midwest:3,south:-2},legislative_effects:4}]},{id:3,phase:`governing`,candidate_id:`rfk_sr`,question:`Organized crime has deeply infiltrated the Teamsters union, one of your most powerful political allies. The FBI director is asking you to authorize a massive federal anti-racketeering investigation.`,answers:[{text:`Authorize the full federal investigation — you came to Washington to fight corruption, and you mean it.`,feedback:`A powerful statement of personal integrity. But the Teamsters withdraw their political support and mobilize against your agenda.`,effects:{political_capital:-20,approval:6,base_enthusiasm:10,funds:-2e4},regional_effects:{northeast:4,west_coast:3,midwest:-4,plains:-3},legislative_effects:-8},{text:`Negotiate a deal — the Teamsters agree to internal reform in exchange for the investigation being shelved.`,feedback:`A pragmatic but morally uncomfortable compromise. The unions stay on board, but your reputation for fighting corruption takes a hit.`,effects:{political_capital:15,approval:-4,base_enthusiasm:-10,funds:2e4},regional_effects:{midwest:3,south:1},legislative_effects:5},{text:`Expand the investigation to ALL organized crime operations nationally — the Teamsters are just one thread.`,feedback:`A sweeping crime offensive that positions you as the toughest law-and-order Democrat in history. Organized labor is furious.`,effects:{political_capital:-25,approval:4,base_enthusiasm:5,funds:-1e4},regional_effects:{northeast:3,west_coast:3,midwest:-3},legislative_effects:-5}]},{id:4,phase:`governing`,candidate_id:`rfk_sr`,question:`The Soviet Union has proposed a historic bilateral nuclear arms reduction treaty. Your military advisors are split. Your base wants peace. The hawks in your own party call it appeasement.`,answers:[{text:`Embrace the treaty fully — sign it in Moscow in a historic summit modeled after your brother's Nuclear Test Ban Treaty.`,feedback:`A generational moment of international statesmanship. Approval soars globally. The military-industrial complex launches a massive opposition campaign.`,effects:{political_capital:-15,approval:8,base_enthusiasm:15,funds:0},regional_effects:{northeast:6,west_coast:5,south:-3,plains:-2},legislative_effects:5},{text:`Negotiate hard — demand major Soviet concessions on Eastern Europe and human rights before signing anything.`,feedback:`A tough-minded diplomatic stance. The treaty gets better terms and bipartisan respect. The process takes months.`,effects:{political_capital:5,approval:4,base_enthusiasm:3,funds:0},regional_effects:{northeast:3,midwest:2,west_coast:2},legislative_effects:4},{text:`Reject the treaty as inadequate and demand verified reductions before any agreement is signed.`,feedback:`Hawks and defense contractors celebrate. The peace wing of the party feels deeply betrayed by your hawkish turn.`,effects:{political_capital:10,approval:-5,base_enthusiasm:-15,funds:1e4},regional_effects:{south:3,plains:3,northeast:-4,west_coast:-3},legislative_effects:3}]},{id:5,phase:`governing`,candidate_id:`rfk_sr`,question:`Your brother's legacy includes the space program. NASA is requesting an unprecedented $40 billion to land on Mars by 1980. Your base loves the ambition; fiscal conservatives call it insanity while poverty persists at home.`,answers:[{text:`Fund it fully — America will reach Mars. The science, jobs, and national pride are worth every dollar.`,feedback:`The announcement electrifies the nation. Engineering schools are flooded with applications. The cost becomes a Republican target.`,effects:{political_capital:-25,approval:5,base_enthusiasm:15,funds:-5e4},regional_effects:{northeast:4,west_coast:5,south:3,midwest:3,plains:2},legislative_effects:-5},{text:`Fund NASA at 60% of the requested amount and redirect the rest to an Apollo-level investment in urban poverty programs.`,feedback:`An intelligent political allocation that satisfies both coalitions partially. Scientists complain about timeline delays.`,effects:{political_capital:-10,approval:4,base_enthusiasm:5,funds:-3e4},regional_effects:{northeast:3,west_coast:3,midwest:2},legislative_effects:3},{text:`Cancel the Mars program and invest the full $40B in a War on Poverty 2.0 targeting urban and rural communities.`,feedback:`The progressive anti-poverty move is wildly popular with your base. The science community is devastated.`,effects:{political_capital:-20,approval:3,base_enthusiasm:20,funds:-4e4},regional_effects:{northeast:5,west_coast:4,midwest:4,south:2,plains:1},legislative_effects:6}]},{id:6,phase:`governing`,candidate_id:`rfk_sr`,question:`The Senate is moving to impeach your Secretary of State over allegations of unauthorized back-channel diplomacy with North Vietnam. The allegations are partially true, and you authorized the back-channel yourself. How do you handle this?`,answers:[{text:`Defend your Secretary completely and reveal you authorized the back-channel — it was the right call for peace.`,feedback:`Your personal honesty and willingness to absorb the political hit earns enormous respect, but the political cost is severe.`,effects:{political_capital:-30,approval:5,base_enthusiasm:10,funds:0},regional_effects:{northeast:3,west_coast:3},legislative_effects:-12},{text:`Accept your Secretary's resignation and distance yourself from the back-channel, calling it unauthorized.`,feedback:`A painful act of political self-preservation. The Secretary falls on their sword. You keep the Senate from imploding.`,effects:{political_capital:10,approval:-5,base_enthusiasm:-12,funds:0},regional_effects:{midwest:2,south:1},legislative_effects:5},{text:`Invoke executive privilege for all communications and dare the Senate to make it a constitutional crisis.`,feedback:`A dramatic constitutional showdown that you ultimately win 6-3 at the Supreme Court. The Senate backs down.`,effects:{political_capital:-15,approval:2,base_enthusiasm:8,funds:0},regional_effects:{northeast:2,west_coast:2},legislative_effects:-5}]},{id:7,phase:`campaign`,candidate_id:`rfk_sr`,question:`Your re-election campaign opens. You are the first Democratic president to run against a significant peace movement within your own party. How do you frame your four years?`,answers:[{text:`Run on ending the Vietnam War — make the body count the opponent's failure, and peace your defining achievement.`,feedback:`A powerful anti-war frame that defines you as the president who ended America's longest war. Veterans are divided but the youth vote is enormous.`,effects:{political_capital:0,approval:4,base_enthusiasm:22,funds:-2e4},regional_effects:{northeast:6,west_coast:6,midwest:1,south:-3,plains:-3}},{text:`Frame the campaign as a new frontier — Mars, civil rights, poverty programs, and a generation of progress.`,feedback:`An aspirational campaign that reaches across coalitions. Kennedy idealism still draws massive crowds.`,effects:{political_capital:5,approval:5,base_enthusiasm:18,funds:-25e3},regional_effects:{northeast:5,west_coast:4,midwest:3,south:1,plains:1}},{text:`Run as the law-and-order progressive — civil rights and crime-fighting as a single unified message.`,feedback:`An unusual but powerful crossover message that pulls working-class white voters back from the Republicans.`,effects:{political_capital:0,approval:3,base_enthusiasm:10,funds:-3e4},regional_effects:{midwest:5,south:4,plains:3,northeast:2}}]},{id:8,phase:`campaign`,candidate_id:`rfk_sr`,question:`Debate night. Your Republican opponent attacks your Vietnam withdrawal as surrender and cowardice. The camera is on you.`,answers:[{text:`Challenge them to name a single American life worth dying for a war that was lost before it began.`,feedback:`One of the most memorable debate moments of the decade. Pacifist America cheers. Defense hawks are infuriated.`,effects:{political_capital:-5,approval:3,base_enthusiasm:25,funds:0},regional_effects:{northeast:6,west_coast:6,south:-4,plains:-4,midwest:-1}},{text:`Calmly list the names of soldiers who came home alive because of your decision — a devastating emotional appeal.`,feedback:`The personal tribute to the living veterans shifts the entire room. Post-debate polls show you won by 15 points.`,effects:{political_capital:5,approval:7,base_enthusiasm:18,funds:0},regional_effects:{northeast:5,west_coast:5,midwest:3,south:1,plains:1}},{text:`Pivot immediately to your economic record and refuse to engage on Vietnam — the war is in the past.`,feedback:`A disciplined dodge, but your base wants more fire. The moment is called 'evasive' in post-debate coverage.`,effects:{political_capital:10,approval:1,base_enthusiasm:-8,funds:0},regional_effects:{midwest:3,south:2}}]},{id:9,phase:`campaign`,candidate_id:`rfk_sr`,question:`A splinter group from the anti-war left is running a third-party candidate, drawing 8% nationally and threatening to cost you key Northern states. How do you respond?`,answers:[{text:`Hold a nationally televised summit with third-party candidate and offer them a formal peace advisory role.`,feedback:`The summit produces a joint statement of principles. Their candidate endorses you in week three. Coalition reunited.`,effects:{political_capital:-10,approval:4,base_enthusiasm:15,funds:-1e4},regional_effects:{northeast:5,west_coast:5,midwest:2}},{text:`Remind progressives that the Republican nominee's first act will be to re-escalate in Vietnam.`,feedback:`The fear message brings 70% of the third-party vote back home. It is effective but alienates idealists.`,effects:{political_capital:5,approval:1,base_enthusiasm:-5,funds:-2e4},regional_effects:{northeast:4,west_coast:4,midwest:1}},{text:`Challenge them to a public debate over your Vietnam withdrawal record — let the progressive voters decide.`,feedback:`You win the debate handily. The third-party candidate's support collapses from 8% to 3% in the following week.`,effects:{political_capital:0,approval:4,base_enthusiasm:12,funds:-1e4},regional_effects:{northeast:4,west_coast:4,midwest:2}}]},{id:10,phase:`campaign`,candidate_id:`rfk_sr`,question:`Newly released FBI documents reveal your brother, President JFK, was investigating organized crime ties to Cuba before his assassination. Republicans are demanding you respond. The story dominates national media.`,answers:[{text:`Announce a full independent commission to investigate any remaining questions about JFK's death — you want the truth too.`,feedback:`A profound political moment of personal integrity. Your approval surges with every demographic. Republicans have no counter.`,effects:{political_capital:-15,approval:8,base_enthusiasm:15,funds:0},regional_effects:{northeast:5,west_coast:4,midwest:4,south:3,plains:2}},{text:`Release a deeply personal statement about your family's grief and call for unity and healing.`,feedback:`A moving human moment that keeps the story from becoming political. The press covers it reverentially.`,effects:{political_capital:5,approval:5,base_enthusiasm:8,funds:0},regional_effects:{northeast:3,west_coast:3,midwest:2,south:1}},{text:`Refuse all comment — this is a private family matter and you will not allow it to be weaponized politically.`,feedback:`Respected but not celebrated. The story runs for a week before finding its natural end.`,effects:{political_capital:10,approval:2,base_enthusiasm:-2,funds:0},regional_effects:{northeast:1,west_coast:1}}]},{id:11,phase:`campaign`,candidate_id:`rfk_sr`,question:`Election Eve. Your coalition of young voters, Black Americans, and working-class Catholics is holding. Where do you make your final push?`,answers:[{text:`A massive midnight rally in Harlem and Bedford-Stuyvesant — honor your anti-poverty record with the communities you served.`,feedback:`The images of a president in the streets of Harlem the night before an election are unforgettable. Turnout is extraordinary.`,effects:{political_capital:0,approval:4,base_enthusiasm:25,funds:-2e4},regional_effects:{northeast:7,midwest:3,west_coast:3}},{text:`A Catholic working-class barnstorm through Pennsylvania, Ohio, and Michigan factory towns.`,feedback:`The crossover coalition holds. Working-class Catholics who Nixon courted come home to you in the Rust Belt.`,effects:{political_capital:0,approval:3,base_enthusiasm:15,funds:-25e3},regional_effects:{midwest:6,northeast:3,south:2}},{text:`A national primetime speech from the Oval Office — the gravity of the presidency as your closing argument.`,feedback:`A commanding presidential finish. Undecided voters trust the incumbent judgment by a decisive margin.`,effects:{political_capital:10,approval:6,base_enthusiasm:10,funds:-15e3},regional_effects:{midwest:4,south:3,northeast:3,west_coast:3,plains:2}}]},{id:12,phase:`campaign`,candidate_id:`rfk_sr`,question:`A credible threat against your life has been uncovered by the Secret Service. They are urging you to dramatically scale back your public appearances in the final days. Your base rallies on crowds. What do you do?`,answers:[{text:`Continue your full campaign schedule — you refuse to live in fear and your country deserves your presence.`,feedback:`An act of extraordinary personal courage that galvanizes the nation. Voter turnout surges among every demographic.`,effects:{political_capital:5,approval:10,base_enthusiasm:30,funds:0},regional_effects:{northeast:5,west_coast:5,midwest:4,south:3,plains:3}},{text:`Reduce large-scale rallies but continue to campaign — hold smaller, more intimate town halls with enhanced security.`,feedback:`A prudent middle ground. The public approves of the measured response and your final week events are deeply personal and moving.`,effects:{political_capital:0,approval:5,base_enthusiasm:12,funds:-1e4},regional_effects:{northeast:4,west_coast:4,midwest:3,south:2}},{text:`Completely suspend public events for 48 hours and send surrogates to hold events in your place.`,feedback:`The Secret Service breathes a sigh of relief. Your opponent calls it weakness. The last-minute absence is felt at the polls.`,effects:{political_capital:5,approval:-3,base_enthusiasm:-15,funds:0},regional_effects:{midwest:-3,south:-3,northeast:-2,west_coast:-2}}]},{id:1,phase:`governing`,candidate_id:`tulsi`,question:`You campaigned on ending America's 'regime change wars.' Now you are inheriting 10,000 U.S. troops in Syria and 2,500 in Afghanistan. The Joint Chiefs are warning that rapid withdrawal will create a power vacuum. What do you do?`,answers:[{text:`Order complete withdrawal from both Syria and Afghanistan within 90 days — a campaign promise is a campaign promise.`,feedback:`Anti-war America celebrates. The establishment foreign policy community erupts. ISIS-affiliated groups immediately expand in the vacuum.`,effects:{political_capital:-15,approval:-3,base_enthusiasm:25,funds:0},regional_effects:{west_coast:4,northeast:3,midwest:-2,south:-4,plains:-4},legislative_effects:-10},{text:`Withdraw from Syria while maintaining a small counterterrorism force in Afghanistan for 18 more months.`,feedback:`A nuanced middle path that keeps the military coalition together while ending the most costly intervention.`,effects:{political_capital:5,approval:4,base_enthusiasm:5,funds:0},regional_effects:{midwest:3,northeast:2,west_coast:2,south:1},legislative_effects:3},{text:`Honor the existing military commitments while refusing any new overseas interventions or deployments.`,feedback:`A quiet but firm anti-interventionist line. Your base is frustrated but respects the measured approach.`,effects:{political_capital:10,approval:2,base_enthusiasm:-10,funds:0},regional_effects:{south:2,plains:1,midwest:1},legislative_effects:2}]},{id:2,phase:`governing`,candidate_id:`tulsi`,question:`The CIA director presents you with intelligence claiming Russia is interfering in allied European elections. The establishment demands sanctions and diplomatic expulsion. Your base is skeptical of intelligence agency claims. What do you do?`,answers:[{text:`Demand full declassification of all intelligence and present it to the American public before any action.`,feedback:`Your demand for transparency wins broad public approval, but allies are alarmed that you are undermining the intelligence community.`,effects:{political_capital:-10,approval:4,base_enthusiasm:15,funds:0},regional_effects:{northeast:2,west_coast:3,south:-2,plains:-2},legislative_effects:-5},{text:`Coordinate multilateral sanctions with European allies through NATO channels.`,feedback:`A measured multilateral response that reassures allies and avoids an intelligence debate at home.`,effects:{political_capital:5,approval:4,base_enthusiasm:-5,funds:0},regional_effects:{northeast:3,west_coast:2,midwest:2},legislative_effects:4},{text:`Refuse to act without direct evidence — invite Russian government representatives to present their case.`,feedback:`Your outreach to Russia shocks the foreign policy establishment and dominates news for weeks. Critics say you are Putin's ally.`,effects:{political_capital:-20,approval:-5,base_enthusiasm:10,funds:0},regional_effects:{plains:2,south:2,northeast:-5,west_coast:-4,midwest:-3},legislative_effects:-10}]},{id:3,phase:`governing`,candidate_id:`tulsi`,question:`Healthcare costs continue to spiral. As a Hindu-American veteran, your coalition spans ideological lines. How do you tackle healthcare as a crossover president?`,answers:[{text:`Propose a Medicare for All system funded by a modest payroll tax — universal coverage, no private insurance.`,feedback:`Progressives cheer. Your military service gives you unusual credibility on this. Conservatives attack, but veterans support you.`,effects:{political_capital:-25,approval:4,base_enthusiasm:20,funds:-3e4},regional_effects:{northeast:5,west_coast:5,midwest:2,south:-3,plains:-3},legislative_effects:-8},{text:`Propose a VA-style federal option for civilians — open enrollment in the Veterans' health system for all Americans.`,feedback:`A brilliant political frame that uses veteran credibility to expand public coverage. Veterans groups rally behind you.`,effects:{political_capital:-10,approval:6,base_enthusiasm:12,funds:-2e4},regional_effects:{south:4,midwest:4,plains:3,northeast:3,west_coast:3},legislative_effects:5},{text:`Focus on price transparency — mandate all hospitals and insurance companies publish prices nationally.`,feedback:`A broadly popular free-market reform that both parties can live with. Costs don't drop dramatically but the system is fairer.`,effects:{political_capital:5,approval:5,base_enthusiasm:-5,funds:0},regional_effects:{midwest:3,south:2,plains:2},legislative_effects:6}]},{id:4,phase:`governing`,candidate_id:`tulsi`,question:`Big Tech platforms have deplatformed multiple political accounts for 'disinformation,' including several allied to your own anti-war coalition. The establishment defends the bans. Your base is furious.`,answers:[{text:`Sign an executive order directing the FCC to treat major social media platforms as public utilities subject to free speech law.`,feedback:`Free speech advocates across the aisle cheer. Silicon Valley immediately challenges in court. The legal battle is landmark.`,effects:{political_capital:-15,approval:3,base_enthusiasm:20,funds:0},regional_effects:{plains:4,south:3,midwest:3,west_coast:-4,northeast:-2},legislative_effects:-5},{text:`Push a bipartisan Section 230 reform bill requiring algorithmic transparency and appeals processes for deplatformed users.`,feedback:`A legally sound compromise that holds platforms accountable while avoiding a free speech absolute. Both parties claim a win.`,effects:{political_capital:-10,approval:4,base_enthusiasm:10,funds:0},regional_effects:{northeast:2,west_coast:2,midwest:3,south:2,plains:2},legislative_effects:6},{text:`Refuse to regulate private companies — defend free-market principles even when you disagree with the outcomes.`,feedback:`Fiscal conservatives applaud your consistency. Your anti-establishment base feels abandoned by their supposed champion.`,effects:{political_capital:10,approval:2,base_enthusiasm:-20,funds:1e4},regional_effects:{south:3,plains:3,northeast:-2,west_coast:-2},legislative_effects:4}]},{id:5,phase:`governing`,candidate_id:`tulsi`,question:`A historic wildfire season has burned millions of acres across the West. Climate scientists demand aggressive federal action. Your coalition spans environmentalists and rural property rights advocates. What do you do?`,answers:[{text:`Declare a National Climate Emergency and redirect $200B in defense spending to renewable energy and forest management.`,feedback:`A bold executive pivot that reframes military spending as an environmental tool. Defense hawks are furious.`,effects:{political_capital:-25,approval:3,base_enthusiasm:20,funds:-3e4},regional_effects:{west_coast:6,northeast:4,south:-4,plains:-4},legislative_effects:-8},{text:`Launch a massive prescribed burn and forest management program — address the root cause, not just the symptoms.`,feedback:`A nonpartisan, science-based forest management approach that wins support from rural communities and environmentalists alike.`,effects:{political_capital:-10,approval:6,base_enthusiasm:8,funds:-2e4},regional_effects:{west_coast:5,plains:3,south:2,midwest:3},legislative_effects:5},{text:`Offer federal matching grants to Western states for their own firefighting and prevention programs.`,feedback:`A federalist approach that respects states' rights. Doesn't address the scale of the crisis but builds goodwill.`,effects:{political_capital:5,approval:3,base_enthusiasm:-5,funds:-15e3},regional_effects:{west_coast:3,plains:2,south:1},legislative_effects:3}]},{id:6,phase:`governing`,candidate_id:`tulsi`,question:`You are the first Hindu American president. A series of anti-Hindu hate crimes across the country has put religious minorities in the spotlight. You can speak from painful personal experience. How do you respond?`,answers:[{text:`Give a prime-time national address from your own experience — this hate is not American, and you will not tolerate it.`,feedback:`Your personal courage and moral clarity make the speech one of the most watched in years. Hate crime prosecutions surge.`,effects:{political_capital:-10,approval:8,base_enthusiasm:15,funds:0},regional_effects:{northeast:5,west_coast:5,midwest:3,south:1,plains:1},legislative_effects:5},{text:`Sign a sweeping federal hate crimes expansion bill and increase FBI resources for religious hate crime investigation.`,feedback:`Strong legislative action that puts resources behind your words. Civil rights organizations applaud the scope.`,effects:{political_capital:-15,approval:6,base_enthusiasm:12,funds:-1e4},regional_effects:{northeast:4,west_coast:4,midwest:2},legislative_effects:7},{text:`Use the moment to launch a national unity commission bringing together leaders from all faiths and backgrounds.`,feedback:`A healing and symbolic gesture that resonates broadly. Critics want more aggressive law enforcement action.`,effects:{political_capital:5,approval:4,base_enthusiasm:5,funds:-5e3},regional_effects:{northeast:3,west_coast:3,midwest:2,south:2,plains:2},legislative_effects:3}]},{id:7,phase:`campaign`,candidate_id:`tulsi`,question:`Your re-election campaign begins. You are the hardest to categorize candidate in American history — anti-war, pro-gun, pro-pot, veteran, Hindu. How do you run on that?`,answers:[{text:`Run explicitly as a 'neither party' independent-minded president: 'I don't owe Wall Street, the Pentagon, or Silicon Valley a thing.'`,feedback:`An electrifying crossover message that draws independents from both parties. Establishment Democrats and Republicans are alarmed.`,effects:{political_capital:0,approval:4,base_enthusiasm:22,funds:-25e3},regional_effects:{midwest:5,south:3,plains:4,northeast:2,west_coast:2}},{text:`Run as the peace candidate — make your anti-war record the single defining frame of the entire campaign.`,feedback:`A strong message with passionate adherents. Veterans' groups provide authentic validation that money can't buy.`,effects:{political_capital:0,approval:3,base_enthusiasm:18,funds:-2e4},regional_effects:{west_coast:5,northeast:4,midwest:2,south:-2,plains:-2}},{text:`Run as the unity candidate — your crossover coalition is America's future, not two warring tribes.`,feedback:`A hopeful message that draws suburban moderates strongly. Your base wants more edge, but the center holds.`,effects:{political_capital:5,approval:5,base_enthusiasm:8,funds:-3e4},regional_effects:{midwest:5,south:3,plains:3,northeast:3,west_coast:3}}]},{id:8,phase:`campaign`,candidate_id:`tulsi`,question:`Your Republican opponent calls you 'a Russian asset and a fraud.' Your Democratic opponents say you are 'not a real Democrat.' The media loves the attack lines. How do you respond?`,answers:[{text:`Challenge both: 'I served this country for 20 years in uniform. What have they sacrificed? Come at me.'`,feedback:`A powerful veteran authenticity moment. The attacks collapse under the weight of your service record.`,effects:{political_capital:-5,approval:5,base_enthusiasm:22,funds:0},regional_effects:{south:4,midwest:4,plains:4,northeast:2,west_coast:2}},{text:`Laugh it off publicly: 'If questioning illegal wars makes me a Russian asset, then America needs more assets like me.'`,feedback:`Your quick wit and calm under fire generate enormous viral moments. The attacks actually help you with independents.`,effects:{political_capital:0,approval:6,base_enthusiasm:18,funds:0},regional_effects:{midwest:5,south:3,northeast:3,west_coast:3,plains:3}},{text:`File defamation lawsuits against the most prominent attackers — force them to prove the claims in court.`,feedback:`A fight your legal team relishes, but the lawsuit coverage keeps the attacks in the news for months.`,effects:{political_capital:-10,approval:-2,base_enthusiasm:10,funds:-2e4},regional_effects:{south:1,plains:1,northeast:-2,west_coast:-2}}]},{id:9,phase:`campaign`,candidate_id:`tulsi`,question:`You are polling at 4% in New Hampshire but 11% among veterans and active military. How do you leverage your unique coalition?`,answers:[{text:`Make New Hampshire a military-first state — campaign exclusively at VFW halls, military bases, and veterans hospitals.`,feedback:`Your veteran support explodes to 18%. The rest of New Hampshire's non-veteran voters give you a second look.`,effects:{political_capital:-5,approval:4,base_enthusiasm:20,funds:-15e3},regional_effects:{northeast:3,south:3,plains:3,midwest:2}},{text:`Hold a primetime national forum with veterans from both parties — let your military peers vouch for you.`,feedback:`The forum generates enormous crossover appeal. Republicans who hate your party love your biography.`,effects:{political_capital:0,approval:5,base_enthusiasm:15,funds:-1e4},regional_effects:{south:4,plains:4,midwest:4,northeast:2,west_coast:2}},{text:`Announce a sweeping veterans' healthcare and homelessness initiative — put your money where your service is.`,feedback:`A policy-driven moment that shows governing depth. Veterans' policy advocates flood your campaign with volunteers.`,effects:{political_capital:-10,approval:6,base_enthusiasm:12,funds:-2e4},regional_effects:{south:5,plains:4,midwest:3,northeast:2,west_coast:2}}]},{id:10,phase:`campaign`,candidate_id:`tulsi`,question:`The Hawaii Democratic Party has officially disendorsed your re-election, saying you have abandoned progressive values. Your own home state is threatening to vote against you. How do you handle the betrayal?`,answers:[{text:`Return to Hawaii for a massive public rally — 'the party bosses don't speak for the Hawaiian people, only I do.'`,feedback:`The rally draws 60,000 people to Honolulu. Hawaii stays in your column and the story becomes your independence narrative.`,effects:{political_capital:-5,approval:4,base_enthusiasm:20,funds:-15e3},regional_effects:{west_coast:5,northeast:3,midwest:2}},{text:`Accept it publicly and make the rejection a badge of honor: 'If the establishment hates me, I'm doing something right.'`,feedback:`Anti-establishment voters across the country send your campaign record donations. Your donor base explodes.`,effects:{political_capital:0,approval:3,base_enthusiasm:18,funds:4e4},regional_effects:{west_coast:4,northeast:3,south:2,plains:2,midwest:2}},{text:`Reach out personally to Hawaiian party leaders and try to repair the relationship privately.`,feedback:`Quiet diplomacy re-establishes a working relationship with the state party, but no public endorsement comes.`,effects:{political_capital:10,approval:2,base_enthusiasm:-5,funds:0},regional_effects:{west_coast:2}}]},{id:11,phase:`campaign`,candidate_id:`tulsi`,question:`Election Eve. Your crossover coalition means your strongest states are an unusual mix. Where do you make the final push?`,answers:[{text:`A multi-state tour: Iowa, Ohio, and Nevada — the crossover battlegrounds where your message is strongest.`,feedback:`Your Midwest and West crossover play works. Independents and ticket-splitting veterans deliver the margin.`,effects:{political_capital:0,approval:3,base_enthusiasm:18,funds:-25e3},regional_effects:{midwest:6,south:3,plains:4,west_coast:3}},{text:`National primetime unity address — broadcast from a military base, surrounded by veterans of all parties.`,feedback:`The image of bipartisan military unity is the most powerful closing argument of the election cycle.`,effects:{political_capital:10,approval:6,base_enthusiasm:12,funds:-15e3},regional_effects:{south:4,midwest:4,plains:4,northeast:3,west_coast:3}},{text:`Focus on Sun Belt states — Arizona, Nevada, and Georgia — where your anti-war and marijuana legalization message plays well.`,feedback:`A bold Sun Belt play that makes Arizona and Nevada swing decisively in your favor.`,effects:{political_capital:0,approval:4,base_enthusiasm:15,funds:-3e4},regional_effects:{south:5,west_coast:5,midwest:1}}]},{id:12,phase:`campaign`,candidate_id:`tulsi`,question:`Final 12 hours. A national security crisis breaks — a North Korean missile test in the Pacific. Your opponent is calling for military strikes. The world is watching the president's response.`,answers:[{text:`Immediately call for calm, activate back-channel diplomacy, and publicly refuse military escalation.`,feedback:`Your anti-war credibility makes this response deeply authentic. Swing voters in the Midwest and West credit your coolness.`,effects:{political_capital:0,approval:5,base_enthusiasm:15,funds:0},regional_effects:{west_coast:4,northeast:4,midwest:4,south:-2,plains:-2}},{text:`Order a proportional show of military force — a naval positioning that signals strength without pulling a trigger.`,feedback:`A calibrated military response that demonstrates presidential resolve without triggering war. Approval holds.`,effects:{political_capital:5,approval:4,base_enthusiasm:5,funds:-5e3},regional_effects:{south:4,plains:3,midwest:3,northeast:2,west_coast:2}},{text:`Hold a live emergency national address explaining the situation and reassuring the American people.`,feedback:`Presidential calm in a crisis is your most powerful campaign closer. Undecideds break heavily for the incumbent.`,effects:{political_capital:10,approval:6,base_enthusiasm:8,funds:0},regional_effects:{midwest:4,south:3,northeast:3,west_coast:3,plains:3}}]},{id:1,phase:`governing`,candidate_id:`biden`,question:`The COVID-19 vaccine has arrived. You inherited a chaotic rollout from your predecessor. 500,000 Americans have died. You have promised 100 million shots in 100 days. Can you deliver?`,answers:[{text:`Invoke the Defense Production Act to nationalize vaccine manufacturing and distribution — the government takes over.`,feedback:`Production explodes. 150 million shots in 100 days. The fastest vaccination drive in human history.`,effects:{political_capital:-20,approval:10,base_enthusiasm:20,funds:-5e4},regional_effects:{northeast:5,west_coast:5,midwest:4,south:3,plains:2},legislative_effects:5},{text:`Partner with pharmacy chains, community health centers, and employers to distribute through existing infrastructure.`,feedback:`A public-private partnership that reaches 120 million shots in 100 days. Community trust is the key advantage.`,effects:{political_capital:-10,approval:8,base_enthusiasm:15,funds:-3e4},regional_effects:{midwest:4,south:3,northeast:4,west_coast:4,plains:3},legislative_effects:4},{text:`Leave distribution to states and offer maximum federal support without overriding governors.`,feedback:`A federalist approach that respects Republican governors' authority. Distribution is uneven but political conflict is minimized.`,effects:{political_capital:5,approval:5,base_enthusiasm:5,funds:-2e4},regional_effects:{south:2,plains:2,midwest:2},legislative_effects:3}]},{id:2,phase:`governing`,candidate_id:`biden`,question:`Your signature $1.2 trillion Bipartisan Infrastructure Law is signed. Now your progressive wing is demanding the $3.5 trillion Build Back Better plan be passed immediately through reconciliation. Manchin and Sinema say no. How do you play this?`,answers:[{text:`Go to West Virginia personally — sit down with Manchin's constituents and make the case for the full bill.`,feedback:`The personal touch moves Manchin to support a trimmed package. West Virginia union workers see real dollars coming.`,effects:{political_capital:-20,approval:4,base_enthusiasm:10,funds:-1e4},regional_effects:{south:3,plains:2,midwest:2},legislative_effects:8},{text:`Accept a scaled-down $1.5 trillion compromise that Manchin and Sinema will actually sign.`,feedback:`Half a loaf is still the largest social investment in a generation. Progressives are furious but the bill is law.`,effects:{political_capital:10,approval:3,base_enthusiasm:-15,funds:0},regional_effects:{midwest:2,south:1,northeast:-1,west_coast:-1},legislative_effects:6},{text:`Hold the line — tell Manchin and Sinema that the full bill is non-negotiable and let the impasse play out publicly.`,feedback:`The standoff dominates the news for months. Nothing passes. Your base is energized but the agenda is stalled.`,effects:{political_capital:-25,approval:-5,base_enthusiasm:20,funds:0},regional_effects:{northeast:2,west_coast:2,midwest:-2,south:-2},legislative_effects:-10}]},{id:3,phase:`governing`,candidate_id:`biden`,question:`The military withdrawal from Afghanistan has turned chaotic. The Taliban has captured Kabul in 11 days. Americans are stranded at the airport. Images of desperate Afghans clinging to aircraft are circling the globe. How do you respond?`,answers:[{text:`Fly to Kabul personally to oversee the evacuation — show the world America does not abandon its people.`,feedback:`The Secret Service is appalled but the image of the president on the ground is a defining act of personal leadership.`,effects:{political_capital:-15,approval:5,base_enthusiasm:15,funds:-2e4},regional_effects:{northeast:3,midwest:3,west_coast:3,south:2,plains:2},legislative_effects:2},{text:`Defend the withdrawal as right, own the chaos, and authorize additional military assets to complete the airlift.`,feedback:`120,000 people are airlifted to safety — the largest airlift in American history. The chaos narrative does not go away.`,effects:{political_capital:-5,approval:-3,base_enthusiasm:5,funds:-3e4},regional_effects:{south:-2,plains:-2,midwest:-1},legislative_effects:0},{text:`Blame the Afghan government and military for collapsing — America cannot be responsible for a country that won't fight for itself.`,feedback:`A hard-nosed but politically damaging deflection. The images of the evacuation haunt your approval rating for months.`,effects:{political_capital:5,approval:-8,base_enthusiasm:-10,funds:0},regional_effects:{south:-3,plains:-3,midwest:-2,northeast:-2},legislative_effects:-5}]},{id:4,phase:`governing`,candidate_id:`biden`,question:`Inflation hits 7%, the highest in 40 years. Republicans are using it to hammer Democrats in every swing district. Your progressive wing wants price controls. Moderates want Fed independence and fiscal restraint.`,answers:[{text:`Stand fully behind Federal Reserve independence to raise rates — let the Fed do its job even if it means short-term pain.`,feedback:`A politically painful but economically sound decision. Inflation peaks and begins to decline. Your polls drop significantly.`,effects:{political_capital:15,approval:-8,base_enthusiasm:-15,funds:0},regional_effects:{midwest:-3,plains:-2,south:-2,northeast:2},legislative_effects:5},{text:`Announce a targeted corporate price-gouging investigation by the FTC in energy and food industries.`,feedback:`A popular and politically effective move that gives voters someone to blame besides you. Gas prices begin to moderate.`,effects:{political_capital:-10,approval:4,base_enthusiasm:12,funds:-1e4},regional_effects:{midwest:3,south:2,northeast:2,west_coast:2,plains:2},legislative_effects:3},{text:`Release record amounts of oil from the Strategic Petroleum Reserve to drive down gas prices before the midterms.`,feedback:`Gas prices fall 40 cents a gallon in two months. The midterm environment improves. Long-term reserves are depleted.`,effects:{political_capital:0,approval:5,base_enthusiasm:0,funds:-5e3},regional_effects:{midwest:4,south:3,plains:3,northeast:2,west_coast:2},legislative_effects:0}]},{id:5,phase:`governing`,candidate_id:`biden`,question:`The Supreme Court has overturned Roe v. Wade in a bombshell decision. Abortion is now illegal in 13 states overnight. Your base is furious and demanding executive action. What do you do?`,answers:[{text:`Sign an executive order protecting access to abortion medication nationwide and directing the DOJ to protect interstate travel for abortions.`,feedback:`A bold executive response that shows you are fighting. Republicans immediately challenge in court, creating a constitutional standoff.`,effects:{political_capital:-15,approval:5,base_enthusiasm:25,funds:0},regional_effects:{northeast:5,west_coast:5,midwest:3,south:-4,plains:-5},legislative_effects:-5},{text:`Call on Congress to codify Roe v. Wade into law, making it explicit that abortion access is federal law.`,feedback:`The legislative push energizes your coalition enormously. The Senate fails by 2 votes, but the fight fires up your GOTV.`,effects:{political_capital:-20,approval:3,base_enthusiasm:20,funds:-2e4},regional_effects:{northeast:4,west_coast:4,south:-3,plains:-3},legislative_effects:-5},{text:`Issue a state of emergency protecting reproductive healthcare under federal civil rights statutes.`,feedback:`A creative legal strategy that is praised for its scope. Courts stay the order but the fight becomes the centerpiece of the election.`,effects:{political_capital:-10,approval:4,base_enthusiasm:18,funds:0},regional_effects:{northeast:4,west_coast:4,midwest:3,south:-3,plains:-4},legislative_effects:-3}]},{id:6,phase:`governing`,candidate_id:`biden`,question:`Russia has invaded Ukraine with 200,000 troops. Your allies demand action. Your base is split between military support for Ukraine and fear of nuclear escalation. What is America's response?`,answers:[{text:`Authorize advanced weapons packages including air defense systems and long-range artillery. 'We will give Ukraine everything it needs to win.'`,feedback:`NATO allies are galvanized. Ukraine holds the front. Republicans in Congress accuse you of risking World War 3.`,effects:{political_capital:-15,approval:4,base_enthusiasm:8,funds:-4e4},regional_effects:{northeast:4,west_coast:3,midwest:2,south:-1},legislative_effects:5},{text:`Organize a massive international sanctions coalition freezing Russia's central bank and removing them from SWIFT.`,feedback:`The most sweeping economic sanctions in history. Russia's economy contracts sharply. NATO unity has never been stronger.`,effects:{political_capital:-10,approval:6,base_enthusiasm:10,funds:-2e4},regional_effects:{northeast:5,west_coast:5,midwest:3,south:2,plains:2},legislative_effects:6},{text:`Pursue direct diplomacy with Moscow, offering Ukraine's neutrality in exchange for a ceasefire and troop withdrawal.`,feedback:`Ukraine feels betrayed. NATO is shaken. But your anti-war base is relieved and polling in the Midwest improves.`,effects:{political_capital:10,approval:-2,base_enthusiasm:-5,funds:0},regional_effects:{midwest:3,plains:2,south:1,northeast:-3,west_coast:-3},legislative_effects:2}]},{id:7,phase:`campaign`,candidate_id:`biden`,question:`Your re-election campaign begins. Your approval is at 44%. Inflation is still the top issue. How do you frame your campaign?`,answers:[{text:`Run on 'Finish the Job' — infrastructure, chips manufacturing, veterans care. The economy just needs more time.`,feedback:`A credible incumbent defense that reminds voters of real accomplishments. Moderates respond to the steady-hand message.`,effects:{political_capital:0,approval:4,base_enthusiasm:5,funds:-3e4},regional_effects:{midwest:5,south:2,northeast:3,west_coast:3,plains:2}},{text:`Run hard on democracy and abortion rights — make it an existential choice, not an economic referendum.`,feedback:`A galvanizing progressive frame that drives base turnout, particularly among women and young voters.`,effects:{political_capital:0,approval:1,base_enthusiasm:22,funds:-25e3},regional_effects:{northeast:5,west_coast:5,midwest:3,south:2,plains:-2}},{text:`Run explicitly against your opponent personally — make the election a character referendum, not a policy debate.`,feedback:`The contrast message is effective in reminding soft Republicans of their doubts. Bipartisan approval holds.`,effects:{political_capital:5,approval:3,base_enthusiasm:10,funds:-2e4},regional_effects:{midwest:4,south:3,northeast:3,west_coast:3,plains:2}}]},{id:8,phase:`campaign`,candidate_id:`biden`,question:`Debate night. Your opponent is aggressive, interrupting, and calling you 'Sleepy Joe.' You are 80 years old. The country is watching to see if you still have it. How do you play it?`,answers:[{text:`Respond with sharp wit and command of facts — show the country the senator who debated Paul Ryan.`,feedback:`You win the exchange on substance. The '10,000 lies' line becomes the most quoted of the cycle. Base is re-energized.`,effects:{political_capital:5,approval:5,base_enthusiasm:18,funds:0},regional_effects:{midwest:4,south:2,northeast:4,west_coast:4,plains:2}},{text:`Ignore the attacks entirely and speak directly to the kitchen table issues — insulin, Social Security, veterans.`,feedback:`A presidential above-the-fray performance that suburban independents call 'dignified and reassuring.'`,effects:{political_capital:10,approval:4,base_enthusiasm:5,funds:0},regional_effects:{midwest:3,south:3,northeast:3,west_coast:3,plains:2}},{text:`Challenge your opponent to answer for January 6th directly — 'Look at what you did. The whole world saw.'`,feedback:`The January 6th challenge lands explosively. Suburban women in Phoenix and Atlanta are visibly moved.`,effects:{political_capital:0,approval:3,base_enthusiasm:22,funds:0},regional_effects:{south:4,midwest:3,northeast:5,west_coast:5}}]},{id:9,phase:`campaign`,candidate_id:`biden`,question:`A prominent progressive activist has publicly said they will not vote for you due to your handling of Gaza. The progressive-to-moderate fault line is at its worst. How do you handle the dissent?`,answers:[{text:`Hold a live town hall with young progressive voters and listen to their concerns about your foreign policy.`,feedback:`Your willingness to show up and listen moves more progressives than any talking point. 'He actually came.'`,effects:{political_capital:-10,approval:3,base_enthusiasm:15,funds:-1e4},regional_effects:{northeast:4,west_coast:4,midwest:2}},{text:`Announce a condition on further military aid — 'the path to weapons support runs through humanitarian corridors.'`,feedback:`The policy shift moves the needle with uncommitted voters and generates enormous progressive goodwill.`,effects:{political_capital:-15,approval:4,base_enthusiasm:18,funds:-1e4},regional_effects:{northeast:5,west_coast:5,midwest:2,south:-2}},{text:`Defend your record firmly and tell progressives you need their vote more than their approval.`,feedback:`A blunt message that resonates with pragmatic progressives. The idealist wing is unenthusiastic but shows up.`,effects:{political_capital:5,approval:1,base_enthusiasm:-5,funds:0},regional_effects:{midwest:2,south:1}}]},{id:10,phase:`campaign`,candidate_id:`biden`,question:`Social Security cuts are being threatened by your opponent. You have defended Social Security your entire career. How do you use this moment?`,answers:[{text:`Make Social Security the centerpiece of the final month — 'They will cut your check. I will not.'`,feedback:`Senior voters, who decide close elections, shift dramatically toward you. Florida becomes genuinely competitive.`,effects:{political_capital:0,approval:6,base_enthusiasm:12,funds:-25e3},regional_effects:{south:5,midwest:4,northeast:4,west_coast:3,plains:3}},{text:`Introduce emergency legislation to expand Social Security benefits by $200/month for current recipients.`,feedback:`A dramatic policy announcement that dominates news cycles and puts Republicans immediately on defense.`,effects:{political_capital:-20,approval:5,base_enthusiasm:18,funds:-1e4},regional_effects:{south:4,midwest:4,northeast:4,west_coast:3,plains:3},legislative_effects:-5},{text:`Hold a forum with senior groups, AARP, and retirees — make the case through trusted messengers.`,feedback:`A powerful endorsement coalition that credibly reaches undecided seniors in Florida, Pennsylvania, and Arizona.`,effects:{political_capital:5,approval:4,base_enthusiasm:8,funds:-15e3},regional_effects:{south:4,midwest:3,northeast:3,west_coast:2,plains:2}}]},{id:11,phase:`campaign`,candidate_id:`biden`,question:`Election Eve. Pennsylvania is the firewall. Which coalition do you energize for the final GOTV?`,answers:[{text:`Put every surrogate — Obama, Clinton, Springsteen — into Philadelphia and Pittsburgh for a massive unity closing.`,feedback:`The star power and legacy endorsements drive record Philadelphia turnout. Pennsylvania holds.`,effects:{political_capital:0,approval:3,base_enthusiasm:20,funds:-35e3},regional_effects:{northeast:6,midwest:3,south:2,west_coast:2}},{text:`Hold a personal intimate campaign event in Scranton — 'I'm coming home one last time.'`,feedback:`The Scranton homecoming is an extraordinarily authentic closing. Pennsylvania's working class responds.`,effects:{political_capital:5,approval:6,base_enthusiasm:15,funds:-15e3},regional_effects:{midwest:6,northeast:5,south:2,plains:2}},{text:`Focus all resources on Wisconsin and Michigan GOTV — build the firewall on multiple walls.`,feedback:`A strategic breadth approach that ensures electoral college paths even if Pennsylvania underperforms.`,effects:{political_capital:0,approval:2,base_enthusiasm:15,funds:-3e4},regional_effects:{midwest:7,northeast:2,south:1}}]},{id:12,phase:`campaign`,candidate_id:`biden`,question:`Election Night. Counting is taking days. Your opponent is claiming fraud before all votes are counted. The country is tense. What is your message to the nation?`,answers:[{text:`Address the nation calmly: 'Every vote will be counted. That is how democracy works. We will accept the result.'`,feedback:`Your calm, presidential statement becomes the defining contrast of the election. The nation breathes a collective sigh of relief.`,effects:{political_capital:10,approval:7,base_enthusiasm:8,funds:0},regional_effects:{northeast:4,west_coast:4,midwest:4,south:3,plains:3}},{text:`Stay silent and let the counting happen without presidential interference of any kind.`,feedback:`A principled democratic gesture. But your supporters get nervous by the second day and want reassurance.`,effects:{political_capital:5,approval:2,base_enthusiasm:-5,funds:0},regional_effects:{midwest:1,northeast:1}},{text:`Publicly challenge your opponent's fraud claims with specific, factual rebuttals from election officials.`,feedback:`Your fact-based response wins over skeptical moderates and keeps the narrative from being dominated by the opposition.`,effects:{political_capital:0,approval:4,base_enthusiasm:12,funds:0},regional_effects:{midwest:3,south:2,northeast:3,west_coast:3,plains:2}}]},{id:1,phase:`governing`,candidate_id:`newsom`,question:`California's housing crisis has become a national crisis. Rents in major cities are up 50% in five years. You campaigned on fixing it. The housing lobby, tenant unions, and NIMBY homeowners all want different things. What is your first national housing move?`,answers:[{text:`Use federal zoning preemption law to override local single-family-only zoning in every major metro in America.`,feedback:`The boldest housing policy in American history. Developers cheer. Suburban homeowners revolt. Millions of units begin planning.`,effects:{political_capital:-25,approval:2,base_enthusiasm:15,funds:-2e4},regional_effects:{west_coast:5,northeast:4,midwest:-3,south:-3,plains:-4},legislative_effects:-8},{text:`Pass a national tenant protection framework — universal rent stabilization and eviction protections for all renters.`,feedback:`60 million renters wake up with new rights. Real estate stocks drop 12%. Suburban landlords fund opposition campaigns.`,effects:{political_capital:-20,approval:5,base_enthusiasm:22,funds:-1e4},regional_effects:{northeast:5,west_coast:5,midwest:3,south:-2,plains:-3},legislative_effects:-6},{text:`Invest $300B in federal housing construction vouchers and grants to states to build more affordable units.`,feedback:`A market-compatible approach that threads the needle between renters and builders. Supply starts to increase slowly.`,effects:{political_capital:-15,approval:4,base_enthusiasm:8,funds:-4e4},regional_effects:{west_coast:3,northeast:3,midwest:3,south:2,plains:2},legislative_effects:6}]},{id:2,phase:`governing`,candidate_id:`newsom`,question:`Unsheltered homelessness has exploded in major cities, with tent cities visible across America. You made this your signature issue in California. Republicans are using it to attack Democrats nationally. How do you address it?`,answers:[{text:`Issue a national directive — every federal agency must make land available for emergency shelter. Housing is a right.`,feedback:`Unprecedented federal mobilization that puts real resources behind the issue. Cities that resist federal direction face enormous political pressure.`,effects:{political_capital:-20,approval:4,base_enthusiasm:20,funds:-5e4},regional_effects:{west_coast:6,northeast:4,midwest:2,south:-2,plains:-3},legislative_effects:-5},{text:`Create a national homelessness czar with $50B and a mandate to reduce visible homelessness by 50% in four years.`,feedback:`A bold target-setting approach that generates accountability. Cities get resources but are expected to show results.`,effects:{political_capital:-15,approval:5,base_enthusiasm:12,funds:-5e4},regional_effects:{west_coast:4,northeast:4,midwest:3,south:2,plains:2},legislative_effects:4},{text:`Fund a national mental health and substance abuse treatment system — address the root causes of chronic homelessness.`,feedback:`A long-term investment that mental health advocates celebrate. Republicans attack you for not clearing encampments.`,effects:{political_capital:-10,approval:3,base_enthusiasm:10,funds:-4e4},regional_effects:{west_coast:3,northeast:4,midwest:2},legislative_effects:5}]},{id:3,phase:`governing`,candidate_id:`newsom`,question:`Climate-fueled wildfires and hurricanes have caused $300B in disaster costs in one year. Insurance companies are pulling out of high-risk states. Millions of homeowners cannot get insurance.`,answers:[{text:`Create a federal climate disaster insurance backstop — the government guarantees coverage where private markets fail.`,feedback:`Millions of homeowners breathe a sigh of relief. Fiscal conservatives call it a $500B liability. Climate advocates say it enables bad development.`,effects:{political_capital:-20,approval:6,base_enthusiasm:10,funds:-6e4},regional_effects:{south:5,west_coast:5,midwest:3,northeast:3,plains:2},legislative_effects:-5},{text:`Declare a National Climate Emergency and accelerate federal restrictions on fossil fuels, emissions, and coastal development.`,feedback:`A bold environmental stance that your progressive base celebrates but that alienates energy-state Democrats.`,effects:{political_capital:-25,approval:3,base_enthusiasm:25,funds:-2e4},regional_effects:{west_coast:7,northeast:5,south:-5,plains:-5,midwest:-3},legislative_effects:-8},{text:`Convene an emergency FEMA restructuring and double disaster recovery funding to states hit by climate disasters.`,feedback:`A practical and popular response that helps without the political war of a climate emergency declaration.`,effects:{political_capital:-10,approval:5,base_enthusiasm:8,funds:-4e4},regional_effects:{south:4,west_coast:4,midwest:3,northeast:3,plains:2},legislative_effects:4}]},{id:4,phase:`governing`,candidate_id:`newsom`,question:`Silicon Valley is demanding a national AI regulatory framework. Labor unions fear mass automation. Tech companies fear overregulation. Progressive advocates want strict oversight. What do you do?`,answers:[{text:`Sign a landmark AI Governance Act — mandatory safety reviews for AI systems and an AI workers' protection fund.`,feedback:`A globally recognized regulatory leadership moment. U.S. tech companies grumble. European allies applaud.`,effects:{political_capital:-15,approval:5,base_enthusiasm:12,funds:-2e4},regional_effects:{west_coast:5,northeast:4,midwest:2},legislative_effects:6},{text:`Convene a year-long blue-ribbon AI commission before any regulation — get it right before you get it fast.`,feedback:`Tech companies are relieved. Labor unions call it kicking the can. The report shapes the global conversation.`,effects:{political_capital:10,approval:3,base_enthusiasm:-5,funds:0},regional_effects:{west_coast:3,northeast:2},legislative_effects:3},{text:`Authorize $100B in federal AI investment for workforce retraining — let the market innovate, government helps workers adapt.`,feedback:`A pro-growth approach that funds worker transition programs without restricting innovation. Both camps claim partial victory.`,effects:{political_capital:-10,approval:4,base_enthusiasm:5,funds:-4e4},regional_effects:{midwest:4,west_coast:3,northeast:3,south:2,plains:2},legislative_effects:5}]},{id:5,phase:`governing`,candidate_id:`newsom`,question:`Record numbers of migrants are arriving at the southern border. Border communities are overwhelmed. Republicans are demanding mass deportation. Your progressive base demands humane treatment and a path to citizenship.`,answers:[{text:`Sign a comprehensive immigration reform bill — a path to citizenship for 11 million undocumented Americans in exchange for modernized border infrastructure.`,feedback:`The most significant immigration reform in 40 years. The Senate barely passes it with 3 Republican votes. Your coalition is unified.`,effects:{political_capital:-30,approval:3,base_enthusiasm:20,funds:-2e4},regional_effects:{west_coast:5,northeast:4,midwest:2,south:-4,plains:-5},legislative_effects:-5},{text:`Expand legal immigration pathways and refugee quotas while increasing resources for faster asylum processing.`,feedback:`A compassionate, orderly approach that reduces backlog and illegal crossings over time. Does not satisfy either extreme.`,effects:{political_capital:-10,approval:4,base_enthusiasm:5,funds:-3e4},regional_effects:{west_coast:3,northeast:3,midwest:2,south:-1},legislative_effects:4},{text:`Deploy National Guard to assist CBP at the border and dramatically increase deportation of those denied asylum.`,feedback:`A centrist enforcement approach that wins moderate approval. Your progressive base calls it a betrayal of immigrant communities.`,effects:{political_capital:10,approval:5,base_enthusiasm:-18,funds:-2e4},regional_effects:{south:4,plains:3,midwest:3,west_coast:-4,northeast:-2},legislative_effects:5}]},{id:6,phase:`governing`,candidate_id:`newsom`,question:`California's Proposition 8 precedent has inspired a national push. A constitutional amendment banning same-sex marriage is gaining Republican support. You are the president who championed marriage equality. How do you fight it?`,answers:[{text:`Codify marriage equality into federal law immediately through the Respect for Marriage Act expansion.`,feedback:`Congress passes the expansion with bipartisan support. A historic legislative achievement that also neutralizes the amendment threat.`,effects:{political_capital:-20,approval:5,base_enthusiasm:20,funds:-1e4},regional_effects:{west_coast:5,northeast:5,midwest:2,south:-4,plains:-5},legislative_effects:5},{text:`Lead a national campaign mobilizing LGBTQ+ organizations and allies to defeat the amendment at the state level.`,feedback:`A grassroots defense that stops the amendment in 12 of the 38 required state legislatures. The threat is contained.`,effects:{political_capital:-15,approval:4,base_enthusiasm:18,funds:-3e4},regional_effects:{west_coast:5,northeast:5,midwest:2},legislative_effects:2},{text:`Challenge the constitutional amendment process itself — invoke equal protection principles in federal court immediately.`,feedback:`A legal blocking strategy that delays the amendment for years while courts deliberate the procedure.`,effects:{political_capital:-10,approval:3,base_enthusiasm:10,funds:-5e3},regional_effects:{west_coast:3,northeast:3,midwest:1},legislative_effects:-2}]},{id:7,phase:`campaign`,candidate_id:`newsom`,question:`Your re-election campaign opens. You are the first California governor elevated to the presidency. Republicans are running against 'coastal elite liberalism.' How do you frame your campaign?`,answers:[{text:`Run explicitly on California as a preview — 'What California does today, America does tomorrow. And America is ready.'`,feedback:`A bold defense of progressive governance that electrifies the coasts. Midwest and South voters are skeptical but intrigued.`,effects:{political_capital:0,approval:2,base_enthusiasm:22,funds:-25e3},regional_effects:{west_coast:6,northeast:5,midwest:-3,south:-4,plains:-4}},{text:`Run as an economic populist — 'We built more clean energy jobs than any state in history. Let's do it for America.'`,feedback:`A compelling jobs-and-economy frame that moves working-class voters in the Rust Belt and Sun Belt.`,effects:{political_capital:5,approval:4,base_enthusiasm:12,funds:-3e4},regional_effects:{midwest:5,south:3,west_coast:4,northeast:3,plains:2}},{text:`Run against the opposition personally — make the choice about authoritarianism versus democracy.`,feedback:`A galvanizing choice frame that drives base turnout. Every voter knows exactly what is at stake.`,effects:{political_capital:0,approval:1,base_enthusiasm:20,funds:-2e4},regional_effects:{west_coast:5,northeast:5,midwest:2,south:1}}]},{id:8,phase:`campaign`,candidate_id:`newsom`,question:`Debate night. Your opponent calls you 'a walking California failure — homelessness, housing, and high taxes.' The entire country has heard this attack for months. How do you respond?`,answers:[{text:`Challenge them with data: 'California has the 5th largest GDP on Earth and 10% of America's GDP. What's your state's economy look like?'`,feedback:`The economic counter-punch lands. Post-debate polling gives you a 9-point win. Silicon Valley celebrates.`,effects:{political_capital:5,approval:5,base_enthusiasm:18,funds:0},regional_effects:{west_coast:5,northeast:5,midwest:2,south:1}},{text:`Own the challenge: 'Yes, California has hard problems. So does America. The difference is I actually show up and try.'`,feedback:`An unexpectedly humble and human moment. Swing voters in the Midwest call it 'the most honest thing I've heard from a politician.'`,effects:{political_capital:0,approval:6,base_enthusiasm:15,funds:0},regional_effects:{midwest:5,south:3,northeast:4,west_coast:4,plains:2}},{text:`Pivot immediately: 'Let's talk about what they did when they had power — January 6th, gutted Medicare, banned books in schools.'`,feedback:`An aggressive contrast pivot that dominates the post-debate coverage. Moderates respect the discipline.`,effects:{political_capital:0,approval:4,base_enthusiasm:20,funds:0},regional_effects:{west_coast:5,northeast:5,south:2,midwest:3}}]},{id:9,phase:`campaign`,candidate_id:`newsom`,question:`A major tech company based in California has announced it is moving its headquarters to Texas to 'escape California's regulatory environment.' Your opponent is calling it proof that your state is failing. How do you respond?`,answers:[{text:`Call the CEO personally on live TV and challenge them to name a single policy that actually drove the move.`,feedback:`The CEO declines. Your bold challenge dominates the news cycle a
