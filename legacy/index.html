`,bio:`The Great Emancipator. An unparalleled statesman whose profound intellect and moral clarity can unite a fractured nation, though his profound principles often draw fierce regional hostility.`,accent:`#475569`,approval:55,capital:70,enthusiasm:65,funds:1e5,legislative_support:65,regions:{northeast:72,west_coast:53,midwest:55,south:28,plains:42},strengths:[`NE`,`MW`],weaknesses:[`SO`],mapId:`lincoln`},{id:`gwbush`,name:`George W. Bush`,era:`Post-9/11 War on Terror`,icon:`🤠`,bio:`The 'Decider.' Ascended to the presidency during a period of relative calm, only to be defined by the 9/11 attacks. Commands massive patriotic fervor and bipartisan support early on, but faces deep regional skepticism over his neoconservative foreign policy.`,accent:`#b91c1c`,approval:55,capital:75,enthusiasm:65,funds:18e4,legislative_support:60,regions:{northeast:42,west_coast:38,midwest:50,south:62,plains:65},strengths:[`PL`,`SO`],weaknesses:[`WC`,`NE`]},{id:`reagan`,name:`Ronald Reagan`,era:`The Reagan Revolution`,icon:`🎬`,bio:`The Great Communicator. A master of the bully pulpit who reshaped the American economy and foreign policy. His optimism and 'Morning in America' messaging give him broad national appeal, though his economic policies polarize the industrial heartland.`,accent:`#991b1b`,approval:54,capital:65,enthusiasm:80,funds:21e4,legislative_support:62,regions:{northeast:50,west_coast:52,midwest:54,south:60,plains:64},strengths:[`PL`,`SO`,`MW`],weaknesses:[`NE`]},{id:`nixon`,name:`Richard Nixon`,era:`The Silent Majority / Watergate`,icon:`✌️`,bio:`The tactical mastermind of the GOP. Nixon rose to power promising 'Law and Order' to a divided nation. While his foreign policy brilliance and creation of the EPA won him broad support, his deep-seated paranoia and the shadow of Watergate eventually became his undoing.`,accent:`#1e3a8a`,approval:48,capital:65,enthusiasm:60,funds:17e4,legislative_support:45,regions:{northeast:45,west_coast:48,midwest:52,south:55,plains:58},strengths:[`MW`,`SO`],weaknesses:[`NE`]}],de=[{id:1,phase:`governing`,question:`A sudden economic downturn has hit manufacturing. Your base wants industry bailouts, but moderates demand fiscal austerity.`,answers:[{text:`Sign a massive corporate bailout and stimulus package.`,feedback:`Your working-class base cheers. Rust Belt and Midwest polling rises — but fiscal hawks are furious.`,effects:{political_capital:-15,approval:5,base_enthusiasm:15,funds:-5e4},regional_effects:{midwest:5,plains:2,northeast:-2},legislative_effects:6,trump_effects:{south:3,plains:3},trump_tag:`plus`},{text:`Implement austerity measures to curb future inflation.`,feedback:`Markets stabilize, but your core voters feel betrayed. Midwest manufacturing regions sour on you.`,effects:{political_capital:10,approval:-10,base_enthusiasm:-20,funds:25e3},regional_effects:{midwest:-5,plains:-2,northeast:2},legislative_effects:-8,trump_effects:{south:-2,plains:-2},trump_tag:`minus`},{text:`Negotiate a targeted manufacturing tax credit compromise.`,feedback:`A middle-ground solution. Neither the base nor fiscal conservatives are thrilled, but no one walks out.`,effects:{political_capital:5,approval:0,base_enthusiasm:-5,funds:-15e3},regional_effects:{midwest:2},legislative_effects:3,trump_effects:null,trump_tag:null}]},{id:2,phase:`governing`,question:`A Supreme Court vacancy has opened. Your nomination will shape constitutional law for a generation. Who do you choose?`,answers:[{text:`Nominate a staunch progressive judge aligned with your base.`,feedback:`Your base is electrified. But moderate senators threaten a filibuster, and the South is outraged.`,effects:{political_capital:-25,approval:-3,base_enthusiasm:25,funds:0},regional_effects:{west_coast:3.5,northeast:3.5,south:-4},legislative_effects:10,trump_effects:{south:-5,plains:-4},trump_tag:`minus`},{text:`Choose a consensus moderate with bipartisan Senate appeal.`,feedback:`The Senate confirms quickly. Moderates approve. Your progressive base feels deeply betrayed.`,effects:{political_capital:15,approval:6,base_enthusiasm:-15,funds:0},regional_effects:{midwest:2,south:2,northeast:-1},legislative_effects:-4,trump_effects:{south:-2,plains:-2},trump_tag:`minus`},{text:`Nominate a business-friendly jurist backed by corporate donors.`,feedback:`PAC donations surge, but your progressive voters call it a corporate sellout.`,effects:{political_capital:-5,approval:-5,base_enthusiasm:-10,funds:5e4},regional_effects:{plains:3,west_coast:-2},legislative_effects:-12,trump_effects:{south:2,plains:1},trump_tag:`plus`}]},{id:3,phase:`governing`,question:`A major trading partner threatens agricultural tariffs over your technology export controls. How do you respond?`,answers:[{text:`Retaliate hard — impose sweeping counter-tariffs on their exports.`,feedback:`Populist crowds cheer the America-First stance, but farm exports crater. The Plains hurt badly.`,effects:{political_capital:5,approval:-4,base_enthusiasm:10,funds:-2e4},regional_effects:{plains:-5,south:-3,midwest:1},legislative_effects:-5,trump_effects:{south:4,plains:5},trump_tag:`plus`},{text:`Negotiate a swift free-trade compromise to end the dispute.`,feedback:`Coastal tech hubs and suburbs cheer the stability. But industrial workers feel sold out.`,effects:{political_capital:10,approval:5,base_enthusiasm:-10,funds:15e3},regional_effects:{west_coast:4,northeast:3,midwest:-4},legislative_effects:6,trump_effects:{south:-4,plains:-4},trump_tag:`minus`},{text:`File a diplomatic complaint through the World Trade Organization.`,feedback:`Avoids escalation, but critics across the aisle call your administration weak and globalist.`,effects:{political_capital:-5,approval:-2,base_enthusiasm:-5,funds:0},regional_effects:{plains:-1},legislative_effects:0,trump_effects:{south:-3,plains:-3},trump_tag:`minus`}]},{id:4,phase:`governing`,question:`A landmark energy bill reaches your desk. Green groups demand clean energy mandates. Energy states demand more drilling.`,answers:[{text:`Sign an executive order banning new drilling and funding clean energy.`,feedback:`Coastal progressives celebrate. But Plains energy workers are furious, and energy bills spike.`,effects:{political_capital:-10,approval:-2,base_enthusiasm:20,funds:-3e4},regional_effects:{west_coast:5,northeast:4,plains:-5,south:-4},legislative_effects:-6,trump_effects:{south:-6,plains:-5},trump_tag:`minus`},{text:`Open public lands for oil exploration to slash fuel prices.`,feedback:`Gas prices fall and corporate donations flow in. But environmentalists hold mass protests.`,effects:{political_capital:5,approval:4,base_enthusiasm:-20,funds:45e3},regional_effects:{plains:5,south:4,west_coast:-6,northeast:-4},legislative_effects:4,trump_effects:{south:5,plains:4},trump_tag:`plus`},{text:`Push a bipartisan roads, bridges, and power grid bill.`,feedback:`Overwhelmingly popular across the spectrum, though it costs significant political capital to pass.`,effects:{political_capital:-15,approval:8,base_enthusiasm:5,funds:-2e4},regional_effects:{midwest:4,south:2,northeast:2},legislative_effects:9,trump_effects:{south:-1,plains:-1},trump_tag:`minus`}]},{id:5,phase:`governing`,question:`Healthcare premiums are spiking to record highs. Congress and the public are demanding action.`,answers:[{text:`Push for a comprehensive Medicare-for-All Public Option.`,feedback:`Requires massive political horse-trading and spending, but fires up the entire progressive base.`,effects:{political_capital:-35,approval:5,base_enthusiasm:30,funds:-6e4},regional_effects:{northeast:3,west_coast:3,plains:-4},legislative_effects:-14,trump_effects:{south:-4,plains:-4},trump_tag:`minus`},{text:`Deregulate state insurance markets to increase consumer choice.`,feedback:`Conservatives approve. Funds stabilize. But your base calls it a giveaway to insurance executives.`,effects:{political_capital:10,approval:-5,base_enthusiasm:-15,funds:1e4},regional_effects:{south:3.5,plains:3.5,northeast:-3},legislative_effects:-5,trump_effects:{south:3,plains:2},trump_tag:`plus`},{text:`Cap prescription drug prices — insulin, seniors' meds, and generics.`,feedback:`A rare bipartisan win. Hugely popular with seniors and working families across the entire map.`,effects:{political_capital:-10,approval:8,base_enthusiasm:10,funds:-1e4},regional_effects:{midwest:3,south:2,northeast:2,west_coast:2,plains:2},legislative_effects:8,trump_effects:{south:1,plains:1},trump_tag:`plus`}]},{id:6,phase:`governing`,question:`A massive cybersecurity breach of the national electric grid has caused widespread power outages. Intel indicates state-sponsored attackers. How do you respond?`,answers:[{text:`Blame the hostile foreign power immediately, ordering retaliatory cyber-attacks.`,feedback:`Your base cheers the strength, but fear of war and escalation causes moderate approval to decline.`,effects:{political_capital:-5,approval:-3,base_enthusiasm:18,funds:-1e4},regional_effects:{northeast:-2,west_coast:-2,plains:2,south:2}},{text:`Address the nation calmly, focus on infrastructure resilience and security updates.`,feedback:`Wins approval for stable leadership. Base enthusiasm is moderate, but energy grid repairs require budget.`,effects:{political_capital:5,approval:6,base_enthusiasm:-5,funds:-3e4},regional_effects:{midwest:3,northeast:2,west_coast:2}},{text:`Push for a sweeping bipartisan Cybersecurity & Infrastructure Act in Congress.`,feedback:`A major legislative push that stabilizes critical infrastructure, though it costs significant political capital.`,effects:{political_capital:-20,approval:4,base_enthusiasm:5,funds:-2e4},legislative_effects:9}]},{id:7,phase:`campaign`,question:`The campaign has officially launched. What is your opening strategic play?`,answers:[{text:`Energetic coastal base mobilization — massive rallies in liberal cities.`,feedback:`Base enthusiasm explodes on the coasts. But rural America sees it as out-of-touch elitism.`,effects:{political_capital:0,approval:2,base_enthusiasm:20,funds:-2e4},regional_effects:{northeast:4,west_coast:4},trump_effects:{south:-3,plains:-2},trump_tag:`minus`},{text:`Heavy TV advertising blitz targeting suburban Midwest families.`,feedback:`Drains funds but converts suburban moderates and builds a solid Midwest edge.`,effects:{political_capital:0,approval:5,base_enthusiasm:5,funds:-5e4},regional_effects:{midwest:6,south:1},trump_effects:null,trump_tag:null},{text:`Populist economic tour through Southern industrial and rural towns.`,feedback:`Resonates strongly with working-class Southern and Plains voters. Makes the South genuinely competitive.`,effects:{political_capital:0,approval:3,base_enthusiasm:10,funds:-3e4},regional_effects:{south:5,midwest:2,plains:2},trump_effects:{south:3,plains:2},trump_tag:`plus`}]},{id:8,phase:`campaign`,question:`Debate night. Your opponent hammers your economic record. The whole country is watching. How do you respond?`,answers:[{text:`Go on the offensive — attack the opponent's corporate lobbying record.`,feedback:`The base is fired up by your fight. But some moderates see it as unpresidential.`,effects:{political_capital:-5,approval:1,base_enthusiasm:15,funds:0},regional_effects:{northeast:2,west_coast:2,south:-2},trump_effects:null,trump_tag:null},{text:`Calmly explain the international economic factors behind inflation.`,feedback:`Scores with educated suburbanites, but feels academic and defensive to working-class viewers.`,effects:{political_capital:10,approval:3,base_enthusiasm:-5,funds:0},regional_effects:{northeast:3,midwest:1},trump_effects:{south:-2,plains:-2},trump_tag:`minus`},{text:`Pivot hard to your jobs record and infrastructure achievements.`,feedback:`Solid and relatable. Working-class voters across the Midwest and South respond strongly.`,effects:{political_capital:0,approval:5,base_enthusiasm:8,funds:0},regional_effects:{midwest:4,south:2,plains:2},trump_effects:{south:2,plains:2},trump_tag:`plus`}]},{id:9,phase:`campaign`,question:`A whistleblower reveals a major donor received a private White House meeting before winning a government contract. The press is in a feeding frenzy.`,answers:[{text:`Publish all records, own the optics, and announce ethics reforms.`,feedback:`A moment of transparency that restores integrity — but short-term approval takes a significant hit.`,effects:{political_capital:10,approval:-6,base_enthusiasm:5,funds:-3e4},regional_effects:{midwest:-2,northeast:1,west_coast:1},trump_effects:{south:-2,plains:-1},trump_tag:`minus`},{text:`Attack the whistleblower's credibility and call it a partisan hoax.`,feedback:`Your base rallies hard. But swing voters in the Midwest and Northeast are disgusted.`,effects:{political_capital:-15,approval:-8,base_enthusiasm:20,funds:0},regional_effects:{plains:2,south:1,northeast:-4,west_coast:-4,midwest:-3},trump_effects:{south:3,plains:3},trump_tag:`plus`},{text:`Flood the airwaves with positive ads to drown out the coverage.`,feedback:`Effectively neutralizes the scandal in the short term, but at enormous financial cost.`,effects:{political_capital:0,approval:1,base_enthusiasm:0,funds:-6e4},regional_effects:{midwest:1},trump_effects:null,trump_tag:null}]},{id:10,phase:`campaign`,question:`A popular progressive third-party candidate is siphoning young voters in key coastal states. What is your play?`,answers:[{text:`Offer a major policy concession — invite their leaders to your climate advisory council.`,feedback:`Progressives return home, but fiscal moderates in the Midwest feel the leftward lurch.`,effects:{political_capital:-10,approval:2,base_enthusiasm:15,funds:-1e4},regional_effects:{west_coast:4,northeast:4,midwest:-2},trump_effects:{south:-4,plains:-3},trump_tag:`minus`},{text:`Ignore them entirely and focus all attacks on the main opponent.`,feedback:`Avoids elevating their profile, but the bleeding in safe coastal states quietly continues.`,effects:{political_capital:5,approval:-2,base_enthusiasm:-10,funds:0},regional_effects:{west_coast:-3,northeast:-3},trump_effects:null,trump_tag:null},{text:`Run targeted attack ads exposing their lack of governing experience.`,feedback:`Successfully damages their credibility with swing voters. A bit cynical, but effective.`,effects:{political_capital:0,approval:3,base_enthusiasm:-5,funds:-25e3},regional_effects:{west_coast:3,northeast:3},trump_effects:{south:1,plains:1},trump_tag:`plus`}]},{id:11,phase:`campaign`,question:`Election Eve. One last move. Where do you direct your final resources and energy?`,answers:[{text:`Massive urban and college GOTV (Get Out The Vote) drive.`,feedback:`Base enthusiasm surges to its peak. Turnout in key urban corridors should be enormous.`,effects:{political_capital:0,approval:3,base_enthusiasm:25,funds:-3e4},regional_effects:{northeast:2,west_coast:2,midwest:2,south:2,plains:1},trump_effects:{south:-2,plains:-2},trump_tag:`minus`},{text:`All-out negative ad blitz in the Midwest and South toss-up districts.`,feedback:`Chips away at the opponent in key states through relentless attack ads. Polarizing, but targeted.`,effects:{political_capital:-10,approval:-3,base_enthusiasm:10,funds:-4e4},regional_effects:{midwest:6,south:5},trump_effects:null,trump_tag:null},{text:`Nationwide primetime unity speech — no attacks, just your vision.`,feedback:`A sweeping, presidential close that wins over remaining undecideds and national press.`,effects:{political_capital:15,approval:8,base_enthusiasm:-5,funds:-2e4},regional_effects:{midwest:3,south:3,northeast:3,west_coast:3,plains:3},trump_effects:{south:-1,plains:-1},trump_tag:`minus`}]},{id:12,phase:`campaign`,question:`An unexpected diplomatic crisis erupts: a US reconnaissance plane is forced down in international waters by a rival superpower. Your opponent calls you weak. How do you respond?`,answers:[{text:`Order a military show of force and demand immediate release of the crew.`,feedback:`Base enthusiasm surges, but fears of escalation cause approval to drop in swing suburbs.`,effects:{political_capital:-10,approval:-2,base_enthusiasm:18,funds:-15e3},regional_effects:{plains:3,south:2,west_coast:-3,northeast:-3}},{text:`Conduct quiet, intense diplomatic negotiations behind closed doors to secure their release.`,feedback:`Moderates praise your calm leadership and the crew is released safely, but your base wishes for a stronger stance.`,effects:{political_capital:10,approval:5,base_enthusiasm:-10,funds:0},regional_effects:{west_coast:3,northeast:3,midwest:1}},{text:`Deliver a primetime address warning of the crisis but refusing to be drawn into a foreign war.`,feedback:`Hits a popular note of cautious strength. Neutralizes the opponent's attacks at moderate financial cost.`,effects:{political_capital:5,approval:4,base_enthusiasm:8,funds:-2e4},regional_effects:{midwest:3,south:2,plains:1}}]},{id:1,phase:`governing`,candidate_id:`lincoln`,question:`Fort Sumter has been bombarded by Confederate forces. Southern states are in open rebellion. The Union hangs by a thread. What is your first move?`,answers:[{text:`Issue an immediate proclamation calling 75,000 militia to defend the Union.`,feedback:`The North rallies with patriotic fury. The border states are alarmed but hold. The war has begun on your terms.`,effects:{political_capital:-10,approval:8,base_enthusiasm:30,funds:-4e4},regional_effects:{northeast:8,midwest:6,south:-10},legislative_effects:5},{text:`Attempt a final diplomatic compromise — offer to let slavery stand where it exists if states return.`,feedback:`Abolitionists are furious and feel betrayed. The South sees it as weakness and presses forward anyway.`,effects:{political_capital:5,approval:-8,base_enthusiasm:-15,funds:0},regional_effects:{northeast:-5,midwest:-3,south:-3},legislative_effects:-5},{text:`Suspend habeas corpus and move to immediately arrest Confederate sympathizers in border states.`,feedback:`The border states are held, but civil libertarians condemn the move as authoritarian overreach.`,effects:{political_capital:-15,approval:-5,base_enthusiasm:10,funds:-2e4},regional_effects:{midwest:2,south:-5,northeast:-2},legislative_effects:-8}]},{id:2,phase:`governing`,candidate_id:`lincoln`,question:`Abolitionists demand you emancipate all enslaved people immediately by executive order. Border state Unionists warn that it will shatter the fragile coalition holding the North together.`,answers:[{text:`Issue the Emancipation Proclamation — free enslaved people in Confederate states immediately.`,feedback:`History is made. The moral weight of the Union cause is transformed. The border states bristle but hold.`,effects:{political_capital:-20,approval:5,base_enthusiasm:30,funds:0},regional_effects:{northeast:8,midwest:4,south:-6},legislative_effects:12},{text:`Propose a gradual, compensated emancipation plan funded by the federal government.`,feedback:`A pragmatic middle ground that keeps border states loyal, though abolitionists call it a moral half-measure.`,effects:{political_capital:10,approval:4,base_enthusiasm:-5,funds:-6e4},regional_effects:{midwest:3,northeast:2,south:-2},legislative_effects:5},{text:`Maintain the status quo — the war is about Union, not slavery, and you say so publicly.`,feedback:`Border states are satisfied. But morale in the Northeast crumbles and international support falters.`,effects:{political_capital:10,approval:-7,base_enthusiasm:-20,funds:0},regional_effects:{northeast:-6,midwest:-2},legislative_effects:-4}]},{id:3,phase:`governing`,candidate_id:`lincoln`,question:`General McClellan refuses to advance on Richmond despite having a massive army. He sends you condescending telegrams. The war is stalling and casualties mount.`,answers:[{text:`Fire McClellan immediately and appoint a more aggressive general to lead the Army of the Potomac.`,feedback:`The gamble pays off in the long run, but the transition is chaotic and the press attacks you as impulsive.`,effects:{political_capital:-15,approval:3,base_enthusiasm:15,funds:-2e4},regional_effects:{northeast:2,midwest:3},legislative_effects:3},{text:`Travel personally to McClellan's headquarters to order him to advance — a direct public confrontation.`,feedback:`The dramatic visit forces McClellan's hand but humiliates the military brass and creates lasting enemies.`,effects:{political_capital:-10,approval:6,base_enthusiasm:8,funds:-1e4},regional_effects:{northeast:4,midwest:2},legislative_effects:-3},{text:`Give McClellan one final formal written order to advance or resign his commission.`,feedback:`A measured ultimatum. McClellan grudgingly moves, though his heart is not in the fight.`,effects:{political_capital:5,approval:-2,base_enthusiasm:-5,funds:0},regional_effects:{midwest:1},legislative_effects:2}]},{id:4,phase:`governing`,candidate_id:`lincoln`,question:`War costs are astronomical. The Treasury is nearly empty. Your finance secretary proposes the first federal income tax and greenback currency to fund the Union Army.`,answers:[{text:`Sign the Revenue Act immediately — institute the income tax and issue $150M in greenbacks.`,feedback:`The treasury stabilizes and the army is paid and fed. Business interests grumble, but the war effort advances.`,effects:{political_capital:-10,approval:-3,base_enthusiasm:5,funds:8e4},regional_effects:{northeast:-2,midwest:1},legislative_effects:6},{text:`Issue war bonds and appeal to Northern patriotism — avoid new taxes.`,feedback:`Bond sales flood in on a wave of patriotic fervor, but the amount raised falls short of military needs.`,effects:{political_capital:5,approval:5,base_enthusiasm:10,funds:4e4},regional_effects:{northeast:4},legislative_effects:2},{text:`Nationalize the railroad system to directly fund the war through freight revenues.`,feedback:`Operationally effective, but railroad magnates immediately begin funding your political opponents.`,effects:{political_capital:-20,approval:-5,base_enthusiasm:-5,funds:6e4},regional_effects:{northeast:-4,midwest:-2},legislative_effects:-8}]},{id:5,phase:`governing`,candidate_id:`lincoln`,question:`War-weary Northerners are mounting massive protests against conscription. Draft riots have broken out in New York City, leaving over 100 dead. The city is on the verge of anarchy.`,answers:[{text:`Deploy federal troops to crush the riots and enforce conscription by military force.`,feedback:`Order is restored, but the brutal suppression generates scathing press. Anti-war Democrats gain in the polls.`,effects:{political_capital:-10,approval:-6,base_enthusiasm:-10,funds:-3e4},regional_effects:{northeast:-5,midwest:-2},legislative_effects:-6},{text:`Allow wealthy men to buy their way out of service for $300 — a commutation clause.`,feedback:`Riots subside as the wealthy opt out, but working-class voters feel bitterly betrayed by the 'rich man's war.'`,effects:{political_capital:10,approval:-8,base_enthusiasm:-15,funds:4e4},regional_effects:{northeast:-4,midwest:-3},legislative_effects:-3},{text:`Personally address the nation, appealing to Northern sacrifice in the name of Union and freedom.`,feedback:`Your words quiet the protests and restore a sense of shared purpose. It costs you, but it holds the country together.`,effects:{political_capital:-20,approval:8,base_enthusiasm:15,funds:-1e4},regional_effects:{northeast:4,midwest:3},legislative_effects:5}]},{id:6,phase:`governing`,candidate_id:`lincoln`,question:`General Ulysses S. Grant has won major victories in the West, but high casualty counts lead critics to call him a 'butcher.' Radical Republicans want him elevated to General-in-Chief, while cautious politicians object.`,answers:[{text:`Appoint Grant as General-in-Chief of all Union armies immediately. 'I cannot spare this man; he fights.'`,feedback:`Grant assumes control, coordinating a relentless strategy. Base morale skyrockets, though the initial casualties alarm moderates.`,effects:{political_capital:-10,approval:4,base_enthusiasm:20,funds:-25e3},regional_effects:{northeast:5,midwest:4},legislative_effects:5},{text:`Keep Grant in the West and maintain General Halleck in Washington to avoid political controversy.`,feedback:`Avoids immediate political fights, but the war lacks cohesive leadership and the base is frustrated.`,effects:{political_capital:10,approval:-5,base_enthusiasm:-10,funds:0},regional_effects:{northeast:-3}},{text:`Bring Grant to Washington for a personal meeting before deciding, to assess his political loyalty.`,feedback:`The meeting builds mutual trust, though the delay irritates Radicals who demand instant action.`,effects:{political_capital:-5,approval:3,base_enthusiasm:5,funds:-1e4},regional_effects:{midwest:2}}]},{id:7,phase:`campaign`,candidate_id:`lincoln`,question:`The 1864 election is here. Democrats are running on an 'immediate peace' platform, calling the war a failure. Defeatism is spreading in the North. Where do you make your stand?`,answers:[{text:`Campaign purely on military victory — no peace without restoration of the Union and an end to slavery.`,feedback:`Sherman's March and the fall of Atlanta deliver you a thunderous military victory just in time to seal the election.`,effects:{political_capital:0,approval:6,base_enthusiasm:20,funds:-3e4},regional_effects:{northeast:5,midwest:6},trump_effects:null,trump_tag:null},{text:`Hint at possible negotiated peace to peel off moderate voters, then pivot once re-elected.`,feedback:`The political triangulation works short-term, but abolitionists and Radical Republicans call it a betrayal.`,effects:{political_capital:5,approval:3,base_enthusiasm:-10,funds:0},regional_effects:{midwest:4,northeast:1},trump_effects:null,trump_tag:null},{text:`Barnstorm the Midwest, focusing on soldiers voting from the battlefield via absentee ballot.`,feedback:`The soldier vote swings massive majorities in your direction. It's the decisive edge in the closest states.`,effects:{political_capital:-5,approval:4,base_enthusiasm:25,funds:-25e3},regional_effects:{midwest:8,northeast:3},trump_effects:null,trump_tag:null}]},{id:8,phase:`campaign`,candidate_id:`lincoln`,question:`A Democratic Party newspaper has published fabricated letters portraying you as corrupt and personally profiteering from the war. It is spreading rapidly across the country.`,answers:[{text:`Ignore it entirely — respond only with your war record and let the truth speak for itself.`,feedback:`The honest stoicism resonates with your supporters, and the forgeries are eventually exposed by rival papers.`,effects:{political_capital:5,approval:2,base_enthusiasm:5,funds:0},regional_effects:{northeast:2,midwest:1},trump_effects:null,trump_tag:null},{text:`Publish a point-by-point rebuttal under your own signature in every major Northern paper.`,feedback:`The forceful response clears the air, though some wonder if the vigorous denial signals hidden guilt.`,effects:{political_capital:-10,approval:4,base_enthusiasm:8,funds:-2e4},regional_effects:{northeast:3},trump_effects:null,trump_tag:null},{text:`Have a friendly editor publicly expose the forgeries and trace them back to Confederate agents.`,feedback:`The scandal backfires spectacularly on the Democrats, painting them as Confederate collaborators.`,effects:{political_capital:-5,approval:8,base_enthusiasm:12,funds:-1e4},regional_effects:{northeast:5,midwest:4},trump_effects:null,trump_tag:null}]},{id:1,phase:`governing`,candidate_id:`obama`,question:`The global financial system is on the verge of total collapse. Lehman Brothers has failed and the Great Recession is spreading. Wall Street needs an emergency bailout to prevent a second Great Depression.`,answers:[{text:`Sign the $700B TARP bailout to rescue the banks — the economy must be stabilized at any cost.`,feedback:`The banking system is saved, but 'bailing out Wall Street' becomes a rallying cry that poisons your base for years.`,effects:{political_capital:-20,approval:-5,base_enthusiasm:-15,funds:0},regional_effects:{northeast:2,midwest:-4,plains:-3},legislative_effects:8},{text:`Let the largest banks fail and use government funds only to protect Main Street depositors and small banks.`,feedback:`The 'moral hazard' stand thrills progressives but triggers a deeper recession. Unemployment climbs to 12%.`,effects:{political_capital:5,approval:-12,base_enthusiasm:10,funds:-5e4},regional_effects:{midwest:-6,south:-4,northeast:-3},legislative_effects:-10},{text:`Pass TARP plus a massive $800B stimulus for infrastructure, green energy, and direct job creation.`,feedback:`The dual rescue package is audaciously expensive but stabilizes both finance and the real economy effectively.`,effects:{political_capital:-30,approval:3,base_enthusiasm:15,funds:-6e4},regional_effects:{midwest:4,northeast:3,west_coast:3,plains:-2},legislative_effects:6}]},{id:2,phase:`governing`,candidate_id:`obama`,question:`The Affordable Care Act is your signature domestic achievement, but it barely survived Congress. Now Republicans and a handful of Red State Democrats want to repeal or gut it before it takes effect.`,answers:[{text:`Fight tooth and nail to defend every clause — use the full power of the White House to hold the line.`,feedback:`The law survives intact. 20 million Americans gain coverage. But Republicans weaponize it in the midterms.`,effects:{political_capital:-25,approval:2,base_enthusiasm:20,funds:-2e4},regional_effects:{northeast:4,west_coast:4,south:-3,plains:-3},legislative_effects:-8},{text:`Negotiate a 'grand bargain' that delays the individual mandate to win over moderate Republicans.`,feedback:`The compromise keeps the framework alive but progressives feel betrayed that you blinked under pressure.`,effects:{political_capital:10,approval:4,base_enthusiasm:-12,funds:0},regional_effects:{midwest:3,south:2,northeast:-2},legislative_effects:5},{text:`Take the case directly to the American people — hold 50 town halls in 50 states in 30 days.`,feedback:`The unprecedented outreach blitz shifts public opinion decisively. Congress holds the line under public pressure.`,effects:{political_capital:-15,approval:7,base_enthusiasm:18,funds:-4e4},regional_effects:{northeast:5,west_coast:4,midwest:3},legislative_effects:4}]},{id:3,phase:`governing`,candidate_id:`obama`,question:`Intelligence agencies have confirmed a high-value Al-Qaeda target in a Pakistani compound. It may be Osama Bin Laden. You can act unilaterally — or risk the intelligence being leaked if you inform Pakistan.`,answers:[{text:`Authorize the Navy SEAL raid without telling Pakistan — go in unilaterally and take the shot.`,feedback:`The raid kills Bin Laden. America erupts in celebration. Your approval rating surges to its highest point ever.`,effects:{political_capital:10,approval:15,base_enthusiasm:20,funds:0},regional_effects:{northeast:5,midwest:4,south:3,plains:2,west_coast:3},legislative_effects:5},{text:`Notify Pakistani intelligence first — preserve the diplomatic relationship even at risk to the mission.`,feedback:`Pakistan responds with outrage and the target disappears. A massive diplomatic incident ensues.`,effects:{political_capital:-20,approval:-10,base_enthusiasm:-15,funds:0},regional_effects:{northeast:-3,south:-5,plains:-4,midwest:-3},legislative_effects:-8},{text:`Order a precision drone strike rather than a ground raid to minimize risk to U.S. forces.`,feedback:`The strike hits, but without a body the kill is unconfirmed. The heroic moment the nation needs never comes.`,effects:{political_capital:5,approval:5,base_enthusiasm:5,funds:-5e3},regional_effects:{northeast:2,midwest:1},legislative_effects:2}]},{id:4,phase:`governing`,candidate_id:`obama`,question:`Occupy Wall Street has paralyzed major American cities. Protesters are calling for wealth redistribution and prosecution of banking executives. Your base agrees. Wall Street threatens to pull funding.`,answers:[{text:`Publicly endorse the protests and announce a new financial crimes task force to prosecute bankers.`,feedback:`Progressives erupt with joy. Occupy becomes a governing mandate. But PAC money floods to your opponent.`,effects:{political_capital:-15,approval:4,base_enthusiasm:25,funds:-5e4},regional_effects:{northeast:5,west_coast:5,midwest:2,south:-3},legislative_effects:-6},{text:`Call for peaceful protest but distance yourself from the movement's more radical demands.`,feedback:`A careful political middle, but both sides feel abandoned. The protests intensify without White House cover.`,effects:{political_capital:5,approval:-3,base_enthusiasm:-10,funds:0},regional_effects:{midwest:1},legislative_effects:2},{text:`Work with mayors to peacefully clear the encampments and redirect energy to Congressional reform bills.`,feedback:`The camps are dismantled but three progressive finance bills pass, channeling the movement's momentum.`,effects:{political_capital:-10,approval:2,base_enthusiasm:-5,funds:0},regional_effects:{northeast:2,west_coast:2,midwest:2},legislative_effects:8}]},{id:5,phase:`governing`,candidate_id:`obama`,question:`Edward Snowden has leaked classified NSA surveillance programs, revealing the government is collecting phone records of millions of Americans. The world is watching your response.`,answers:[{text:`Defend the program as essential national security infrastructure and prosecute Snowden under the Espionage Act.`,feedback:`The intelligence community is satisfied, but civil libertarians and your progressive base call it a betrayal of core values.`,effects:{political_capital:10,approval:-5,base_enthusiasm:-15,funds:0},regional_effects:{northeast:-4,west_coast:-5,south:2,plains:1},legislative_effects:4},{text:`Announce sweeping NSA reforms and publicly acknowledge the surveillance went too far.`,feedback:`Progressives and civil libertarians cheer. Intelligence hawks are furious. The trust in your administration is restored.`,effects:{political_capital:-15,approval:5,base_enthusiasm:15,funds:-1e4},regional_effects:{northeast:5,west_coast:5,south:-2},legislative_effects:-5},{text:`Commission an independent review panel — delay a definitive position while you assess the political fallout.`,feedback:`The cautious non-answer frustrates everyone. Critics say you are hiding behind bureaucracy.`,effects:{political_capital:5,approval:-3,base_enthusiasm:-8,funds:0},regional_effects:{northeast:-1,west_coast:-1},legislative_effects:0}]},{id:1,phase:`governing`,candidate_id:`trump`,question:`Your signature campaign promise was building a wall on the southern border. Congress is dragging its feet on funding. Your base is watching. How do you get your wall?`,answers:[{text:`Declare a national emergency and redirect military construction funds — build it by executive order.`,feedback:`The base goes wild. 'BUILD THAT WALL!' trends nationally. Republicans in Congress largely fall in line, though legal challenges immediately flood the courts.`,effects:{political_capital:5,approval:-1,base_enthusiasm:30,funds:-8e4},regional_effects:{plains:7,south:6,northeast:-5,west_coast:-5},legislative_effects:4,trump_effects:{south:8,plains:8},trump_tag:`plus`},{text:`Negotiate a comprehensive immigration reform bill that trades wall funding for a path to citizenship.`,feedback:`A grand compromise passes, but your base feels betrayed. Right-wing media calls it 'amnesty.'`,effects:{political_capital:15,approval:3,base_enthusiasm:-25,funds:-4e4},regional_effects:{midwest:3,south:-3,plains:-4,northeast:3},legislative_effects:10,trump_effects:{south:-8,plains:-8},trump_tag:`minus`},{text:`Use the budget reconciliation process to sneak wall funding into an omnibus spending bill.`,feedback:`$5B in wall funding passes quietly. The base is mollified. The move sparks a government shutdown threat.`,effects:{political_capital:-20,approval:0,base_enthusiasm:10,funds:-3e4},regional_effects:{south:3,plains:3},legislative_effects:6,trump_effects:{south:4,plains:4},trump_tag:`plus`}]},{id:2,phase:`governing`,candidate_id:`trump`,question:`Tech companies and Silicon Valley executives are furious that you want to restrict the H-1B visa program, which imports hundreds of thousands of high-skilled foreign workers annually. Your MAGA base cheers. Big Tech threatens to move jobs overseas.`,answers:[{text:`Slash H-1B quotas by 75% — American jobs for American workers, no exceptions.`,feedback:`The base is ecstatic. Silicon Valley erupts in fury. Several tech giants announce they are relocating engineering hubs to Canada.`,effects:{political_capital:-5,approval:-3,base_enthusiasm:22,funds:-2e4},regional_effects:{plains:6,south:5,midwest:3,west_coast:-8,northeast:-4},legislative_effects:2,trump_effects:{south:6,plains:6},trump_tag:`plus`},{text:`Raise H-1B minimum salaries dramatically to $200K+ so companies can't use them as cheap labor.`,feedback:`A clever compromise that protects American wages without alienating all of tech. Both sides claim partial victory.`,effects:{political_capital:5,approval:5,base_enthusiasm:8,funds:0},regional_effects:{plains:2,south:2,midwest:2,west_coast:-2},legislative_effects:5,trump_effects:{south:3,plains:3},trump_tag:`plus`},{text:`Give tech executives exactly what they want — maintain H-1B in exchange for massive domestic job pledges.`,feedback:`Billion-dollar factory announcements flood the news cycle. But MAGA influencers say you sold out to globalists.`,effects:{political_capital:10,approval:4,base_enthusiasm:-20,funds:4e4},regional_effects:{midwest:4,west_coast:2,plains:-4,south:-3},legislative_effects:8,trump_effects:{south:-6,plains:-6},trump_tag:`minus`}]},{id:3,phase:`governing`,candidate_id:`trump`,question:`You are on the brink of a massive trade war with China. Your economists warn tariffs will raise consumer prices. Your base loves the 'America First' framing. The stock market is jittery.`,answers:[{text:`Slap 25% tariffs on all Chinese goods — America First, take it or leave it.`,feedback:`The base is roaring. China retaliates against American soybeans and pork. Plains farmers feel the pain immediately.`,effects:{political_capital:5,approval:-4,base_enthusiasm:18,funds:-3e4},regional_effects:{plains:-4,south:-3,midwest:-2,northeast:-2,west_coast:-2},legislative_effects:2,trump_effects:{south:5,plains:5},trump_tag:`plus`},{text:`Threaten tariffs loudly, extract concessions privately, then declare victory without full implementation.`,feedback:`A classic negotiating win on paper, but the art-of-the-deal crowd is suspicious. Markets breathe easier.`,effects:{political_capital:10,approval:3,base_enthusiasm:5,funds:1e4},regional_effects:{midwest:3,south:1,plains:1},legislative_effects:3,trump_effects:{south:2,plains:2},trump_tag:`plus`},{text:`Negotiate a broad Phase One trade deal — China agrees to purchase billions in American agricultural goods.`,feedback:`Farmer incomes surge. The heartland cheers. But critics say you let China off easy on structural reforms.`,effects:{political_capital:5,approval:5,base_enthusiasm:10,funds:2e4},regional_effects:{plains:6,south:4,midwest:5,northeast:1,west_coast:1},legislative_effects:5,trump_effects:{south:4,plains:4},trump_tag:`plus`}]},{id:4,phase:`governing`,candidate_id:`trump`,question:`The Department of Justice, run by your own appointees, is investigating allegations of financial misconduct from your business empire pre-presidency. It is dominating the news cycle. What is your move?`,answers:[{text:`Fire the DOJ officials leading the investigation — the deep state is out to get you.`,feedback:`Your base cheers your defiance. While the media calls it obstruction, your party in Congress stands firmly behind you. Approval with moderates dips, but you keep control of the narrative.`,effects:{political_capital:-5,approval:-4,base_enthusiasm:20,funds:0},regional_effects:{south:3,plains:3,northeast:-6,west_coast:-6,midwest:-4},legislative_effects:4,trump_effects:{south:5,plains:5},trump_tag:`plus`},{text:`Release your tax returns to prove financial transparency and call the investigation baseless.`,feedback:`The tax returns reveal some embarrassing details but nothing criminal. Moderates are relieved. The story fades.`,effects:{political_capital:5,approval:6,base_enthusiasm:-15,funds:-1e4},regional_effects:{northeast:3,midwest:4,south:-3,plains:-3},legislative_effects:5,trump_effects:{south:-4,plains:-4},trump_tag:`minus`},{text:`Attack the investigation relentlessly on social media — keep your base fired up and on offense.`,feedback:`Your base sees it as a political witch hunt and donates record amounts. But the story never dies.`,effects:{political_capital:-5,approval:-4,base_enthusiasm:15,funds:3e4},regional_effects:{plains:1,south:1,northeast:-3,west_coast:-3},legislative_effects:0,trump_effects:{south:3,plains:3},trump_tag:`plus`}]},{id:5,phase:`governing`,candidate_id:`trump`,question:`Tech giants Twitter and Facebook have banned you from their platforms for policy violations. Tens of millions of your most loyal followers are cut off from your primary communication channel.`,answers:[{text:`Launch your own social media platform — Truth Social — and make it a subscriber-funded movement.`,feedback:`Truth Social becomes a massive fundraising ecosystem for your base. While critics call it a vanity project, it gives you an unfiltered channel to your supporters.`,effects:{political_capital:0,approval:-1,base_enthusiasm:25,funds:4e4},regional_effects:{plains:5,south:5,northeast:-4,west_coast:-4},legislative_effects:2,trump_effects:{south:7,plains:7},trump_tag:`plus`},{text:`File antitrust lawsuits against Big Tech — use the DOJ to investigate censorship as market manipulation.`,feedback:`Populists across the aisle support antitrust action. Silicon Valley lobbyists mobilize against you, but your base is thrilled to see you fighting back.`,effects:{political_capital:-5,approval:5,base_enthusiasm:15,funds:-2e4},regional_effects:{plains:3,south:3,midwest:3,west_coast:-2},legislative_effects:5,trump_effects:{south:4,plains:4},trump_tag:`plus`},{text:`Use the moment to push through Section 230 reform in Congress — make platforms legally liable for censorship.`,feedback:`A policy win that reshapes the internet legal landscape. The legislative fight is tough, but it's a core priority for your party.`,effects:{political_capital:-10,approval:3,base_enthusiasm:10,funds:-1e4},regional_effects:{plains:2,south:2,midwest:1},legislative_effects:8,trump_effects:{south:2,plains:2},trump_tag:`plus`}]},{id:1,phase:`governing`,candidate_id:`aoc`,question:`You've staked your presidency on passing the Green New Deal — a $10 trillion transformation of the American economy. Corporate Democrats and all Republicans are threatening to kill it in committee.`,answers:[{text:`Go nuclear — use the full weight of your grassroots movement to primary every Democrat who votes no.`,feedback:`Three key Democratic holdouts fold under massive constituent pressure. The GND passes by a razor-thin margin.`,effects:{political_capital:-30,approval:3,base_enthusiasm:35,funds:-2e4},regional_effects:{northeast:7,west_coast:7,midwest:-4,south:-6,plains:-5},legislative_effects:10},{text:`Accept a scaled-down 'Green New Deal Lite' — clean electricity mandates only, no job guarantees.`,feedback:`Something passes, but progressive media calls it a betrayal of the movement. 'You had the votes and blinked.'`,effects:{political_capital:10,approval:2,base_enthusiasm:-20,funds:0},regional_effects:{northeast:2,west_coast:2,midwest:1},legislative_effects:5},{text:`Take the GND directly to the streets — a 50-city mobilization to make it a first-term mandate.`,feedback:`Youth turnout explodes. Polling shifts 8 points in favor nationally. Congress is forced to hold floor votes.`,effects:{political_capital:-15,approval:5,base_enthusiasm:30,funds:-5e4},regional_effects:{northeast:6,west_coast:6,midwest:2},legislative_effects:7}]},{id:2,phase:`governing`,candidate_id:`aoc`,question:`Wall Street titans and major corporations are spending $500 million against your wealth tax proposal, which would tax assets over $50 million at 2% annually. Your base demands you fight.`,answers:[{text:`Increase the wealth tax to 3% over $50M and 5% over $1B — go bigger and make it a class war.`,feedback:`The policy is enormously popular among working-class voters nationally. Stock market drops 8% in one week.`,effects:{political_capital:-20,approval:6,base_enthusiasm:25,funds:-3e4},regional_effects:{northeast:4,west_coast:4,midwest:4,south:2,plains:2},legislative_effects:-10},{text:`Pair the wealth tax with a $5,000 universal dividend check mailed to every American adult.`,feedback:`The 'Democracy Dividend' is a political masterstroke. Popularity soars even in red states. Economists are divided.`,effects:{political_capital:-30,approval:10,base_enthusiasm:20,funds:-8e4},regional_effects:{northeast:5,west_coast:4,midwest:5,south:4,plains:3},legislative_effects:-5},{text:`Accept a capital gains tax hike instead — less ambitious but more likely to actually pass Congress.`,feedback:`A watered-down win. Progressive donors are frustrated but the policy still raises $400B over ten years.`,effects:{political_capital:10,approval:2,base_enthusiasm:-15,funds:0},regional_effects:{northeast:1,west_coast:1},legislative_effects:5}]},{id:6,phase:`governing`,candidate_id:`aoc`,question:`A high-profile scandal involving your Chief of Staff regarding illegal campaign contributions surfaces. The opposition demands an immediate firing and a public apology.`,answers:[{text:`Fire your Chief of Staff publicly and launch an independent investigation into your own campaign.`,feedback:`The immediate accountability maintains your moral standing with the base, though it causes chaos in your administration.`,effects:{political_capital:-15,approval:-2,base_enthusiasm:10,funds:-1e4},regional_effects:{northeast:-2,west_coast:-2},legislative_effects:-5},{text:`Defend your Chief of Staff, labeling the scandal as a 'smear campaign' by banking lobbyists.`,feedback:`Solidifies your base, but moderate Democrats start distancing themselves from you in the press.`,effects:{political_capital:-20,approval:-6,base_enthusiasm:15,funds:0},regional_effects:{northeast:-4,west_coast:-4},legislative_effects:-10},{text:`Task a third-party committee to oversee the investigation while your Chief of Staff takes a paid leave.`,feedback:`A measured, tactical response that prevents a full-blown meltdown and keeps your legislative agenda on track.`,effects:{political_capital:5,approval:2,base_enthusiasm:-5,funds:-5e3},regional_effects:{midwest:1},legislative_effects:2}]},{id:1,phase:`governing`,candidate_id:`bernie`,question:`As you prepare to address the nation for the first time as President, you feel the weight of history on your shoulders. A razor-thin win means if your close Senate allies didn't make it, the people's agenda is dead on arrival. The tragic events of the January 6th Capitol riots have divided the nation. What speech do you choose to give?`,answers:[{text:`Give a unifying speech eulogizing the dead, promising to rebuild the nation and bring it back together.`,feedback:`Your presidential tone reassures moderates and establishment media, but your core grassroots base feels you are diluting the movement.`,effects:{political_capital:15,approval:6,base_enthusiasm:-15,funds:0},regional_effects:{northeast:2,midwest:3,south:2,plains:1},legislative_effects:5},{text:`Speak directly to the insurrection and the extremes of the far-right. Warn supporters of the massive resistance ahead in a 50-50 Senate to lower expectations.`,feedback:`Faiz and Kamala advise against this. It sets a combative tone right out of the gate and alarms moderates, though it keeps expectations honest.`,effects:{political_capital:-5,approval:-4,base_enthusiasm:10,funds:0},regional_effects:{northeast:-1,west_coast:-1,south:-2,plains:-2},legislative_effects:-5},{text:`Honor the memory of those who died defending democracy, promising to build an America where the economy works for workers over billionaires.`,feedback:`Electrifies your progressive movement and frames your presidency as a moral struggle. Opponents slam you as polarizing.`,effects:{political_capital:-10,approval:3,base_enthusiasm:25,funds:0},regional_effects:{northeast:5,west_coast:5,south:-4,plains:-4},legislative_effects:-8}]},{id:2,phase:`governing`,candidate_id:`bernie`,question:`The Senate Parliamentarian has ruled that the $15 federal minimum wage cannot be included in the upcoming budget reconciliation package. Your base demands you fight. How do you respond?`,answers:[{text:`Have the Vice President overrule the parliamentarian and force a floor vote on the $15 minimum wage.`,feedback:`You demonstrate absolute commitment, but moderate Democrats rebel, defeating the vote and draining your legislative trust.`,effects:{political_capital:-30,approval:-3,base_enthusiasm:30,funds:-1e4},regional_effects:{northeast:4,west_coast:4,plains:-5,south:-5},legislative_effects:-15},{text:`Compromise on a $12 minimum wage to keep moderate Senate Democrats on board and pass the bill quickly.`,feedback:`A pragmatic legislative victory. It stabilizes the economy, but progressive media slams it as a total capitulation.`,effects:{political_capital:15,approval:4,base_enthusiasm:-20,funds:1e4},regional_effects:{midwest:4,south:2,northeast:-3,west_coast:-3},legislative_effects:8},{text:`Refuse to back down. Use the bully pulpit to host massive pressure rallies in key moderate senators' home states.`,feedback:`Massive crowds turn out, putting intense pressure on swing senators. The bill hangs in balance, but base energy is sky-high.`,effects:{political_capital:-15,approval:3,base_enthusiasm:15,funds:-25e3},regional_effects:{midwest:3,south:2},legislative_effects:-4}]},{id:3,phase:`governing`,candidate_id:`bernie`,question:`Progressive advocacy groups demand you cancel all $1.6 trillion in student loan debt by executive order. Moderate legal scholars warn the Supreme Court will immediately strike it down as an abuse of power.`,answers:[{text:`Sign a sweeping executive order cancelling all federal student loan debt immediately.`,feedback:`A historic move that electrifies young voters on the coasts. Opponents launch immediate legal battles, freezing the order.`,effects:{political_capital:-20,approval:-2,base_enthusiasm:35,funds:-3e4},regional_effects:{northeast:6,west_coast:6,plains:-5,south:-5},legislative_effects:-10},{text:`Issue a targeted executive order cancelling $10,000 per borrower, subject to strict income caps.`,feedback:`A moderate compromise that survives initial legal reviews and wins suburban approval, but fails to excite the youth base.`,effects:{political_capital:5,approval:5,base_enthusiasm:-15,funds:-1e4},regional_effects:{midwest:3,northeast:2},legislative_effects:4},{text:`Decline the executive order and push Congress to pass a tuition-free public college bill.`,feedback:`A legally sound approach, but with a 50-50 Senate, the bill is immediately gridlocked in committee.`,effects:{political_capital:-10,approval:2,base_enthusiasm:-10,funds:0},regional_effects:{midwest:1},legislative_effects:5}]},{id:4,phase:`governing`,candidate_id:`bernie`,question:`Inflation is rising, driving up energy and food prices. Corporations report record profits. The corporate lobby blames your spending, while your base demands a crackdown on price gouging.`,answers:[{text:`Introduce a corporate Windfall Profits Tax in Congress, blaming corporate greed for inflation.`,feedback:`The message is extremely popular with working-class voters. Wall Street reacts negatively and markets slip.`,effects:{political_capital:-15,approval:5,base_enthusiasm:22,funds:-3e4},regional_effects:{midwest:4,northeast:3,south:-2,plains:-3},legislative_effects:-8},{text:`Support the Federal Reserve's plan to raise interest rates, warning that cooling the economy is necessary.`,feedback:`Markets stabilize and inflation concerns ease, but your working-class base suffers from higher borrowing costs.`,effects:{political_capital:15,approval:-8,base_enthusiasm:-20,funds:2e4},regional_effects:{midwest:-4,plains:-2,northeast:2},legislative_effects:6},{text:`Authorize targeted federal subsidies and direct logistics aid to ease supply chain bottlenecks.`,feedback:`A non-ideological, practical approach that helps lower costs slowly without sparking corporate battles.`,effects:{political_capital:-10,approval:3,base_enthusiasm:-5,funds:-2e4},regional_effects:{midwest:3,plains:1},legislative_effects:4}]},{id:5,phase:`governing`,candidate_id:`bernie`,question:`A Supreme Court vacancy opens. Your choice will set the court's direction. Your base demands a progressive legal giant, while moderate senators threaten a filibuster.`,answers:[{text:`Nominate a staunch progressive labor lawyer known for anti-monopoly and civil rights work.`,feedback:`Your base is thrilled by this ideological stance. A brutal confirmation battle begins, stalling other legislation.`,effects:{political_capital:-30,approval:-1,base_enthusiasm:28,funds:0},regional_effects:{northeast:5,west_coast:5,south:-5,plains:-4},legislative_effects:-12},{text:`Choose a mainstream liberal judge strongly endorsed by the party establishment.`,feedback:`Wins quick confirmation and moderate support. Your progressive base grumbles but accepts the strategic pick.`,effects:{political_capital:10,approval:5,base_enthusiasm:-10,funds:0},regional_effects:{midwest:3,south:2,northeast:-1},legislative_effects:5},{text:`Nominate a business-friendly centrist jurist to secure a supermajority confirmation.`,feedback:`A highly controversial decision. Progressive groups hold protests outside the White House, calling it a sellout.`,effects:{political_capital:20,approval:4,base_enthusiasm:-25,funds:3e4},regional_effects:{south:4,plains:3,northeast:-4,west_coast:-4},legislative_effects:8}]},{id:6,phase:`governing`,candidate_id:`bernie`,question:`Healthcare costs are rising. You want to lower the Medicare age to 55 and expand coverage to include dental, vision, and hearing. Insurance companies launch a multi-million dollar ad campaign against it.`,answers:[{text:`Launch a national tour targeting insurance lobbies by name, demanding the full Medicare expansion.`,feedback:`Your rallies attract massive crowds. The base is energized, but the legislative fight is extremely contentious.`,effects:{political_capital:-25,approval:4,base_enthusiasm:25,funds:-4e4},regional_effects:{northeast:3,west_coast:3,midwest:3,south:1,plains:1},legislative_effects:-6},{text:`Compromise to lower the Medicare age to 60 with no dental, vision, or hearing benefits.`,feedback:`Passes the Senate quickly, but progressives are frustrated that you didn't hold out for the full expansion.`,effects:{political_capital:10,approval:2,base_enthusiasm:-15,funds:0},regional_effects:{midwest:2,south:1},legislative_effects:6},{text:`Focus instead on passing a bipartisan bill to allow Medicare to negotiate prescription drug prices.`,feedback:`An extremely popular policy that cuts costs for seniors, though it tables the expansion for now.`,effects:{political_capital:-5,approval:8,base_enthusiasm:12,funds:-15e3},regional_effects:{midwest:4,south:3,northeast:3,west_coast:3,plains:3},legislative_effects:8}]},{id:7,phase:`campaign`,candidate_id:`bernie`,question:`The midterm cycle has concluded and your presidential re-election campaign officially begins. What is the central message of your campaign?`,answers:[{text:`Frame the campaign as 'The Unfinished Revolution' against billionaires and the political establishment.`,feedback:`Your anti-establishment stance excites young voters and working-class progressives, but swing voters are wary.`,effects:{political_capital:0,approval:-1,base_enthusiasm:25,funds:-2e4},regional_effects:{northeast:5,west_coast:5,plains:-4,south:-4}},{text:`Focus on your popular achievements, like drug price negotiations, presenting yourself as a pragmatist.`,feedback:`Builds a strong bridge to independent voters and moderates in the Midwest, but dampens the enthusiast edge.`,effects:{political_capital:10,approval:5,base_enthusiasm:-5,funds:-3e4},regional_effects:{midwest:5,south:2,northeast:1}},{text:`Emphasize the threat of the far-right returning to power, building a broad coalition to defend democracy.`,feedback:`Unites the party establishment and progressives behind you, raising significant funds from major donors.`,effects:{political_capital:5,approval:3,base_enthusiasm:10,funds:4e4},regional_effects:{northeast:3,west_coast:3,midwest:2}}]},{id:8,phase:`campaign`,candidate_id:`bernie`,question:`Debate night. The opponent launches a sharp attack: 'President Sanders wants to turn America into a bankrupt socialist state.' The cameras are on you. How do you respond?`,answers:[{text:`Define democratic socialism: 'It means healthcare as a right, free college, and strong unions like in Denmark.'`,feedback:`The Scandinavian defense resonates with progressives, but conservative media uses it to claim you want foreign models.`,effects:{political_capital:-5,approval:0,base_enthusiasm:22,funds:0},regional_effects:{northeast:4,west_coast:4,south:-3,plains:-3}},{text:`Pivot to American history: Frame your policies as completing FDR's Economic Bill of Rights.`,feedback:`A brilliant patriotic framing that scores points with working-class voters in the Rust Belt.`,effects:{political_capital:5,approval:4,base_enthusiasm:10,funds:0},regional_effects:{midwest:5,plains:1,northeast:2}},{text:`Dismiss the label: 'I don't care about labels. I care why Americans pay the highest prices in the world for drugs.'`,feedback:`Highly effective at deflecting the socialist label, focusing on popular pocketbook issues.`,effects:{political_capital:0,approval:6,base_enthusiasm:5,funds:0},regional_effects:{midwest:3,south:3,plains:2,northeast:2,west_coast:2}}]},{id:9,phase:`campaign`,candidate_id:`bernie`,question:`Energy prices remain volatile, and environmental groups demand you enforce a federal ban on new fracking permits. Opponents warn this will spike gas prices in key swing states.`,answers:[{text:`Stand firm on your environmental principles. Enforce the fracking ban to combat climate change.`,feedback:`Your climate base is ecstatic. However, gas prices rise, and polling in industrial Rust Belt regions drops.`,effects:{political_capital:-10,approval:-4,base_enthusiasm:25,funds:-2e4},regional_effects:{west_coast:5,northeast:4,midwest:-5,plains:-5,south:-4}},{text:`Temporarily release strategic oil reserves and support a gas tax holiday to lower short-term consumer costs.`,feedback:`Lowers costs at the pump, providing immediate political relief, though environmentalists slam the move.`,effects:{political_capital:5,approval:5,base_enthusiasm:-15,funds:-1e4},regional_effects:{midwest:4,plains:3,south:2}},{text:`Announce a massive federal program to build clean energy manufacturing plants in the Rust Belt.`,feedback:`A strong green jobs message that links environmental policy with industrial manufacturing in swing states.`,effects:{political_capital:-15,approval:3,base_enthusiasm:12,funds:-4e4},regional_effects:{midwest:6,northeast:2,plains:1}}]},{id:10,phase:`campaign`,candidate_id:`bernie`,question:`A wealthy, moderate third-party candidate enters the race. They are self-funding a campaign focused on suburban voters, accusing your administration of class warfare. How do you handle them?`,answers:[{text:`Expose their corporate backers and call them out as a billionaire trying to buy the election to protect their wealth.`,feedback:`Your populist rhetoric hits home. Base voters are energized, and the third-party candidate's support slides.`,effects:{political_capital:-5,approval:3,base_enthusiasm:18,funds:-2e4},regional_effects:{midwest:3,northeast:3,west_coast:2}},{text:`Ignore the candidate entirely and focus all your campaign resources on the main Republican opponent.`,feedback:`Avoids giving them free publicity, but their support quietly holds in wealthy, moderate suburbs.`,effects:{political_capital:5,approval:-2,base_enthusiasm:-10,funds:0},regional_effects:{northeast:-2,west_coast:-2}},{text:`Run targeted ads highlighting how voting for a spoiler will hand the White House to the far-right.`,feedback:`Effectively pulls moderate voters back to the Democratic coalition out of fear of the opposition.`,effects:{political_capital:0,approval:4,base_enthusiasm:-5,funds:-25e3},regional_effects:{northeast:3,west_coast:3,midwest:2}}]},{id:11,phase:`campaign`,candidate_id:`bernie`,question:`A foreign conflict escalates, and the national security establishment demands U.S. military intervention. Your anti-war base demands you refuse, while opponents accuse you of isolationist weakness.`,answers:[{text:`Refuse military intervention. Focus on diplomatic sanctions and call for a negotiated ceasefire.`,feedback:`Aligns perfectly with your lifelong anti-war principles. The base is proud, but critics call it weak.`,effects:{political_capital:-5,approval:-3,base_enthusiasm:22,funds:0},regional_effects:{west_coast:4,northeast:3,plains:-4,south:-4}},{text:`Provide economic aid and weapons to allies, but explicitly rule out sending any U.S. combat troops.`,feedback:`A middle ground that supports the ally without risking American lives. Most swing voters approve.`,effects:{political_capital:10,approval:4,base_enthusiasm:5,funds:-2e4},regional_effects:{midwest:3,northeast:3,south:1}},{text:`Order targeted U.S. military strikes to protect international shipping lanes and show presidential resolve.`,feedback:`Demonstrates strong commander-in-chief credentials, but your anti-war base feels deeply betrayed.`,effects:{political_capital:15,approval:3,base_enthusiasm:-25,funds:-15e3},regional_effects:{south:4,plains:3,northeast:-3,west_coast:-4}}]},{id:12,phase:`campaign`,candidate_id:`bernie`,question:`Election Eve. One final push. Where do you hold your massive final rally to mobilize the country?`,answers:[{text:`Hold a massive progressive mobilization rally in Detroit and Madison to maximize Rust Belt turnout.`,feedback:`Turnout in industrial working-class centers is high. The Midwest is highly competitive.`,effects:{political_capital:0,approval:2,base_enthusiasm:25,funds:-3e4},regional_effects:{midwest:6,northeast:2}},{text:`Deliver a nationwide broadcast town hall focusing on healthcare, appealing to independent working-class families.`,feedback:`A powerful final pitch that reaches a broad audience, securing crucial swing voters.`,effects:{political_capital:10,approval:6,base_enthusiasm:5,funds:-2e4},regional_effects:{midwest:3,south:2,plains:2,northeast:2,west_coast:2}},{text:`Conduct a whistle-stop campaign tour through Southern manufacturing towns to court crossover union voters.`,feedback:`Makes surprising gains among working-class voters in the South, tightening the race.`,effects:{political_capital:0,approval:3,base_enthusiasm:12,funds:-25e3},regional_effects:{south:5,midwest:1}}]},{id:6,phase:`governing`,candidate_id:`obama`,question:`The Sandy Hook Elementary School massacre has shocked the nation. Twenty children are dead. You are facing enormous pressure from the public and your party to pursue sweeping gun control legislation, but the NRA and the Republican Senate majority are fiercely opposed.`,answers:[{text:`Use the full weight of the presidency to push for universal background checks and an assault weapons ban in Congress.`,feedback:`Your moral leadership unites the nation in grief and generates massive public support, but the Senate Republicans block the bill in a bitter filibuster fight.`,effects:{political_capital:-25,approval:4,base_enthusiasm:20,funds:-2e4},regional_effects:{northeast:5,west_coast:5,midwest:-2,south:-4,plains:-5},legislative_effects:-8},{text:`Issue 23 executive actions on gun safety and direct the ATF to enforce existing laws more rigorously.`,feedback:`The executive actions are praised for their scope and avoid the legislative graveyard, though gun rights advocates call it executive overreach.`,effects:{political_capital:-10,approval:3,base_enthusiasm:10,funds:0},regional_effects:{northeast:3,west_coast:3,midwest:-1,south:-2,plains:-3},legislative_effects:2},{text:`Personally travel the country holding town halls in every congressional district, building a grassroots pressure campaign.`,feedback:`A months-long listening tour shifts public opinion, but Washington remains gridlocked and nothing passes before the election cycle.`,effects:{political_capital:-15,approval:5,base_enthusiasm:5,funds:-3e4},regional_effects:{northeast:2,west_coast:2,midwest:1},legislative_effects:0}]},{id:7,phase:`campaign`,candidate_id:`obama`,question:`Your re-election campaign has officially launched under the slogan 'Forward.' Mitt Romney is the Republican nominee, making strong appeals to business owners and suburban voters. Where do you open your campaign?",`,answers:[{text:`Launch with a massive 'middle class' economic pitch — focus on jobs created, auto industry rescue, and student loan reform.`,feedback:`A winning economic message that makes the Rust Belt and Ohio competitive. Manufacturing communities respond strongly.`,effects:{political_capital:0,approval:5,base_enthusiasm:10,funds:-3e4},regional_effects:{midwest:6,south:2,northeast:2}},{text:`Focus on the 99% vs 1% frame — hammer Romney's Bain Capital record and offshore bank accounts.`,feedback:`Devastating class-war attacks paint Romney as out of touch. Young voters are energized but suburban moderates flinch.`,effects:{political_capital:0,approval:2,base_enthusiasm:20,funds:-25e3},regional_effects:{northeast:4,west_coast:4,midwest:3,south:-2}},{text:`Open with a massive multicultural coalition GOTV blitz targeting Black, Latino, and youth voters.`,feedback:`Unprecedented turnout among minority communities provides the decisive electoral margin. Ohio and Florida are on the map.`,effects:{political_capital:0,approval:3,base_enthusiasm:22,funds:-35e3},regional_effects:{south:4,midwest:4,northeast:2,west_coast:2}}]},{id:8,phase:`campaign`,candidate_id:`obama`,question:`First presidential debate. You had a disastrous performance and your poll numbers slid nationwide. Romney has momentum. The press is calling your campaign in crisis. How do you recover for debate two?`,answers:[{text:`Come out swinging — attack Romney's 47% remarks and his Bain Capital outsourcing record directly and relentlessly.`,feedback:`'Mr. Romney: when you were campaigning in Ohio, you outsourced those jobs.' The crowd erupts. The debate is a clear win.`,effects:{political_capital:5,approval:6,base_enthusiasm:20,funds:0},regional_effects:{midwest:5,south:2,northeast:3,west_coast:3}},{text:`Pivot to presidential gravitas — lead with foreign policy wins (Bin Laden, Libya) and force Romney to defend his inexperience.`,feedback:`A commanding performance on national security. Romney stumbles on Libya and you win the foreign policy exchange decisively.`,effects:{political_capital:5,approval:5,base_enthusiasm:12,funds:0},regional_effects:{northeast:3,west_coast:3,midwest:2}},{text:`Present a detailed second-term policy agenda — make the case for your next four years on substance.`,feedback:`Wonkish but credible. Independents rate you the winner on specifics. The base wanted more blood but the numbers recover.`,effects:{political_capital:10,approval:4,base_enthusiasm:5,funds:0},regional_effects:{midwest:3,south:1,northeast:2,west_coast:2}}]},{id:9,phase:`campaign`,candidate_id:`obama`,question:`Hurricane Sandy makes landfall days before the election, devastating New Jersey and New York. FEMA is responding. The Romney campaign is calling it a political disaster for them. How do you handle this moment?`,answers:[{text:`Suspend all campaign activities — immediately visit the disaster zone and demonstrate hands-on federal leadership.`,feedback:`Governor Christie praises you publicly. The image of bipartisan competence wins over the last undecideds decisively.`,effects:{political_capital:10,approval:8,base_enthusiasm:5,funds:-1e4},regional_effects:{northeast:7,midwest:3,west_coast:2,south:2,plains:2}},{text:`Publicly coordinate FEMA response from the White House, calling governors personally while maintaining campaign schedule.`,feedback:`Demonstrates effective management from Washington, though critics say you could have done more in person.`,effects:{political_capital:5,approval:5,base_enthusiasm:5,funds:0},regional_effects:{northeast:4,midwest:2}},{text:`Coordinate relief but immediately pivot attack ads in Ohio and Wisconsin to keep electoral pressure on Romney.`,feedback:`Effective tactically but a visually jarring contrast between disaster ads and attack ads. National press is critical.`,effects:{political_capital:0,approval:-2,base_enthusiasm:10,funds:-3e4},regional_effects:{midwest:4,south:2,northeast:-2}}]},{id:10,phase:`campaign`,candidate_id:`obama`,question:`A wealthy libertarian-leaning tech billionaire is running third-party, siphoning college-educated suburban voters in Florida and Colorado. How do you deal with this threat?`,answers:[{text:`Highlight the spoiler effect — remind voters that a third-party vote in a swing state is a vote for Romney.`,feedback:`Effectively brings pragmatic progressives back home. Suburban women in Colorado return and the state looks solid.`,effects:{political_capital:0,approval:3,base_enthusiasm:5,funds:-2e4},regional_effects:{west_coast:3,northeast:3,midwest:2}},{text:`Offer a high-profile science and technology summit invitation, signaling tech-friendly policy to their voters.`,feedback:`Silicon Valley donors are impressed. The candidate's support among tech workers fades, leaving their suburban coalition fractured.`,effects:{political_capital:-5,approval:4,base_enthusiasm:3,funds:3e4},regional_effects:{west_coast:4,northeast:2}},{text:`Ignore them entirely and outspend them in Ohio and Iowa to lock down the firewall states.`,feedback:`Firewall strategy succeeds. The third-party candidate fails to break 5% and their voters split heavily your way on election day.`,effects:{political_capital:5,approval:1,base_enthusiasm:-5,funds:-4e4},regional_effects:{midwest:5,south:2}}]},{id:11,phase:`campaign`,candidate_id:`obama`,question:`Election Eve. Internal polling shows Ohio and Virginia are knife-edge. Where do you direct the final GOTV resources?`,answers:[{text:`All-in on Ohio — every volunteer, every dollar, every surrogate in Cleveland, Columbus, and Cincinnati.`,feedback:`Ohio is yours. The firewall holds. The decisive margin in Ohio comes from record turnout in Cuyahoga County.`,effects:{political_capital:0,approval:2,base_enthusiasm:18,funds:-35e3},regional_effects:{midwest:7,south:1}},{text:`Split resources between Ohio and Virginia to maximize electoral vote ceiling.`,feedback:`You win both states, providing a comfortable electoral college cushion. A complete evening nationally.`,effects:{political_capital:5,approval:3,base_enthusiasm:12,funds:-4e4},regional_effects:{midwest:4,south:5,northeast:2}},{text:`Nationwide primetime closing argument — make the case for four more years in your most soaring speech.`,feedback:`Your speech goes viral and nets enormous final-night donations. Undecided voters credit it as their tipping point.`,effects:{political_capital:10,approval:6,base_enthusiasm:8,funds:-2e4},regional_effects:{midwest:3,south:3,northeast:3,west_coast:3,plains:2}}]},{id:12,phase:`campaign`,candidate_id:`obama`,question:`A last-minute foreign policy crisis erupts: classified documents alleging a cover-up over the Benghazi attack have been leaked. Romney is calling for your resignation. The election is in 48 hours.`,answers:[{text:`Hold an emergency press conference, lay out every fact transparently, and call the timing politically motivated.`,feedback:`Your calm and command of the details defuses the attack. Romney's desperation tactic backfires badly with undecideds.`,effects:{political_capital:10,approval:5,base_enthusiasm:10,funds:0},regional_effects:{northeast:3,west_coast:3,midwest:2,south:2,plains:1}},{text:`Dismiss the leak publicly as a partisan intelligence operation and refuse further comment.`,feedback:`The story dies by election morning but your base wants more fight. Moderates are unimpressed by the stonewalling.`,effects:{political_capital:0,approval:-2,base_enthusiasm:5,funds:0},regional_effects:{south:-2,midwest:-1}},{text:`Flood the final 48 hours with surrogate attacks on Romney's foreign policy record and veterans' issues.`,feedback:`The counter-offensive drowns out the Benghazi story and pivots to your strengths. You win the news cycle decisively.`,effects:{political_capital:-5,approval:3,base_enthusiasm:15,funds:-25e3},regional_effects:{south:3,midwest:4,northeast:2,west_coast:2}}]},{id:6,phase:`governing`,candidate_id:`trump`,question:`COVID-19 is spreading rapidly. Your public health advisors are recommending a national lockdown. Your base hates restrictions. The economy is collapsing. You are caught between your instincts and the science.`,answers:[{text:`Dismiss the severity publicly, keep the economy open, and push states to resist lockdowns.`,feedback:`Your base rallies behind you. But as the death toll mounts, suburban moderates recoil and your approval with seniors collapses.`,effects:{political_capital:5,approval:-8,base_enthusiasm:20,funds:2e4},regional_effects:{plains:5,south:4,midwest:-3,northeast:-6,west_coast:-6},legislative_effects:2,trump_effects:{south:5,plains:5},trump_tag:`plus`},{text:`Endorse a short national '15 days to slow the spread' guideline, then declare victory and reopen aggressively.`,feedback:`A tactical middle ground. The guidelines satisfy nervous moderates briefly, but the virus accelerates and the short window backfires.`,effects:{political_capital:5,approval:-2,base_enthusiasm:5,funds:-1e4},regional_effects:{midwest:1},legislative_effects:2,trump_effects:{south:2,plains:2},trump_tag:`plus`},{text:`Fast-track Operation Warp Speed — an unprecedented $10B federal push to develop a vaccine in under a year.`,feedback:`A monumental scientific achievement. The vaccine arrives before the election and becomes your most undeniable policy win.`,effects:{political_capital:-20,approval:6,base_enthusiasm:15,funds:-3e4},regional_effects:{northeast:4,midwest:4,south:3,plains:3,west_coast:3},legislative_effects:4,trump_effects:{south:3,plains:3},trump_tag:`plus`}]},{id:7,phase:`campaign`,candidate_id:`trump`,question:`Your re-election campaign kicks off in Tulsa, Oklahoma. Polls show a closer race than expected. The Democratic nominee is running on a 'return to normalcy' message. What is your opening strategic play?`,answers:[{text:`Double down on MAGA energy — massive rallies in red and competitive states to maximize base turnout.`,feedback:`'Four More Years!' echoes from Tulsa to Pittsburgh. Base enthusiasm hits record highs. Suburban flight is the price.`,effects:{political_capital:0,approval:-2,base_enthusiasm:30,funds:-3e4},regional_effects:{plains:7,south:6,midwest:2,northeast:-4,west_coast:-4},trump_effects:{south:6,plains:6},trump_tag:`plus`},{text:`Run as the economy president — tout pre-COVID job numbers, stock market records, and energy independence.`,feedback:`A powerful economic record that cuts through the COVID narrative. Suburban moderates listen and your numbers stabilize.`,effects:{political_capital:5,approval:4,base_enthusiasm:10,funds:-25e3},regional_effects:{midwest:5,south:3,plains:4,northeast:1},trump_effects:{south:3,plains:3},trump_tag:`plus`},{text:`Frame the election as a fight for law and order — exploit urban unrest and anti-protest sentiment to fire up suburban voters.`,feedback:`Law and order messaging resonates in exurban communities. Democrats are caught flat-footed defending their flank.`,effects:{political_capital:0,approval:-1,base_enthusiasm:18,funds:-2e4},regional_effects:{midwest:4,south:4,plains:5,northeast:-3,west_coast:-5},trump_effects:{south:5,plains:4},trump_tag:`plus`}]},{id:8,phase:`campaign`,candidate_id:`trump`,question:`Presidential debate night. The moderator keeps interrupting your attacks. The Democrat is trying to appear calm and presidential. How do you play the debate?`,answers:[{text:`Relentlessly interrupt and dominate — chaos is your power, control is theirs. Own the stage.`,feedback:`Your supporters love the energy. But post-debate polls show suburban swing voters were repelled by the interruptions.`,effects:{political_capital:-5,approval:-4,base_enthusiasm:25,funds:0},regional_effects:{plains:4,south:3,midwest:-3,northeast:-4,west_coast:-4},trump_effects:{south:4,plains:4},trump_tag:`plus`},{text:`Let them talk. Come prepared with actual policy — the stock market numbers, vaccine progress, low unemployment.`,feedback:`An unusually disciplined performance that wins neutral observers. Wall Street donors reward the restrained Trump with checks.`,effects:{political_capital:10,approval:5,base_enthusiasm:5,funds:3e4},regional_effects:{midwest:4,south:2,northeast:2},trump_effects:{south:2,plains:2},trump_tag:`plus`},{text:`Attack the opposition's family and personal character directly, making the story personal.`,feedback:`A brutal personal attack that fires up your base, but moderators call it unprecedented. The moment goes viral for the wrong reasons.`,effects:{political_capital:-15,approval:-8,base_enthusiasm:20,funds:0},regional_effects:{plains:3,south:3,midwest:-5,northeast:-6,west_coast:-6},trump_effects:{south:5,plains:5},trump_tag:`plus`}]},{id:9,phase:`campaign`,candidate_id:`trump`,question:`Mail-in voting is expanding massively due to COVID. Your base hates mail-in voting, but early data suggests it's expanding turnout in Democratic-leaning groups. How do you respond?`,answers:[{text:`Declare mail-in voting a rigged fraud and urge your base to vote in person on Election Day only.`,feedback:`Your base listens, creating a massive 'Red Wave' of in-person voting on Election Day. Your party supports the focus on 'election integrity,' though it polarizes the electorate.`,effects:{political_capital:5,approval:-2,base_enthusiasm:20,funds:0},regional_effects:{plains:3,south:3,midwest:1,northeast:-3,west_coast:-3},trump_effects:{south:4,plains:4},trump_tag:`plus`},{text:`Build a massive Republican early voting and mail-in operation to match the Democrats' turnout infrastructure.`,feedback:`Your party builds an unprecedented operation. While some in the base are skeptical of mail-in voting, the structural advantage is clear.`,effects:{political_capital:-5,approval:3,base_enthusiasm:5,funds:-4e4},regional_effects:{midwest:4,south:4,plains:4,northeast:2},trump_effects:{south:3,plains:3},trump_tag:`plus`},{text:`Pressure USPS leadership to slow mail delivery in Democratic-majority counties in key swing states.`,feedback:`The move is highly controversial and leaked to the press. It fires up the base but creates a significant national backlash, though your party defends your right to 'oversee agency efficiency.'`,effects:{political_capital:-5,approval:-6,base_enthusiasm:15,funds:0},regional_effects:{plains:2,south:2,northeast:-6,west_coast:-6,midwest:-4},trump_effects:{south:2,plains:2},trump_tag:`plus`}]},{id:10,phase:`campaign`,candidate_id:`trump`,question:`Internal polls show you are down in Pennsylvania and Michigan. You need a Hail Mary. A foreign intelligence leak appears to tie your Democratic opponent to a corrupt overseas deal. What do you do?`,answers:[{text:`Blast the story on Twitter, hold a press conference, and demand your allies amplify it across conservative media.`,feedback:`The story dominates your news ecosystem. Hardcore supporters are electrified. Mainstream media is skeptical, but your party amplifies the message.`,effects:{political_capital:5,approval:-1,base_enthusiasm:20,funds:2e4},regional_effects:{plains:5,south:4,northeast:-4,west_coast:-4,midwest:-1},trump_effects:{south:5,plains:5},trump_tag:`plus`},{text:`Work with FBI officials to launch a formal investigation and let the legal drama play out publicly.`,feedback:`A formal investigation creates damaging headlines. Voters are somewhat skeptical, but the legal pressure is undeniable.`,effects:{political_capital:10,approval:1,base_enthusiasm:10,funds:0},regional_ef
